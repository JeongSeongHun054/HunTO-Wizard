    // opener already has openSizeBB invested, so they only need to add the difference to call.
    const facingThreeBet = { type: 'threebet', openerPos, threebettorPos: callerPos, sizeBB: threeBetSizeBB, potBB, toCallBB: threeBetSizeBB - openSizeBB };
    const vs3betDecision = Preflop.decidePreflop(seats.opener.cards, openerPos, facingThreeBet, { tableSize, rng, iterations });
    snapshots.push(makePreflopSnapshot('opener', seats, facingThreeBet, potBB, vs3betDecision, tableSize, effStackBB));

    if (vs3betDecision.action === 'fold') {
      return finalize(seats, snapshots, null);
    }

    if (vs3betDecision.action === 'call') {
      potBB += threeBetSizeBB - openSizeBB;
      const buckets = Preflop.rangeBucketsForFacing(openerPos, facingThreeBet, tableSize, { rng, iterations: 150 });
      rangeState.opener = buckets.call;
      return proceedToFlop({ seats, seatKeyByPos, rangeState, snapshots, potBB, lastAggressorSeat, effStackBB, tableSize, rng, iterations, deck, cursor });
    }

    // vs3betDecision.action === 'raise' -> 4-bet
    lastAggressorSeat = 'opener';
    const fourBetSizeBB = vs3betDecision.sizeBB;
    potBB += fourBetSizeBB - openSizeBB;
    rangeState.opener = Preflop.fourBetRange(openerPos);

    // --- ROUND 4: caller facing 4bet (bounded - call or fold only) ---
    // potBB already equals blinds + open + 3bet + 4bet, i.e. the full pot before caller acts.
    // caller already has threeBetSizeBB invested, so they only need to add the difference to call.
    const facingFourBet = { type: 'fourbet', fourbettorPos: openerPos, sizeBB: fourBetSizeBB, potBB, toCallBB: fourBetSizeBB - threeBetSizeBB };
    const vs4betDecision = Preflop.decidePreflop(seats.caller.cards, callerPos, facingFourBet, { tableSize, rng, iterations });
    snapshots.push(makePreflopSnapshot('caller', seats, facingFourBet, potBB, vs4betDecision, tableSize, effStackBB));

    if (vs4betDecision.action !== 'call') {
      return finalize(seats, snapshots, null); // fold, or a rare 'raise' we don't model further -> treat as end
    }
    potBB += fourBetSizeBB - threeBetSizeBB;
    const buckets4 = Preflop.rangeBucketsForFacing(callerPos, facingFourBet, tableSize, { rng, iterations: 150 });
    rangeState.caller = buckets4.call;

    return proceedToFlop({ seats, seatKeyByPos, rangeState, snapshots, potBB, lastAggressorSeat, effStackBB, tableSize, rng, iterations, deck, cursor });
  }

  function makePreflopSnapshot(seatKey, seats, facing, potBBAfter, decision, tableSize, effStackBB) {
    const seat = seats[seatKey];
    return {
      street: 'preflop',
      seatKey,
      pos: seat.pos,
      heroCards: seat.cards,
      board: [],
      facing,
      potBB: facing.potBB !== undefined ? facing.potBB : 1.5,
      decision,
      tableSize,
      effStackBB,
    };
  }

  function proceedToFlop(ctx) {
    const { seats, seatKeyByPos, rangeState, snapshots, effStackBB, tableSize, rng, iterations } = ctx;
    let { potBB, lastAggressorSeat, deck, cursor } = ctx;

    const seatA = 'opener', seatB = 'caller';
    const firstActor = postflopIndex(seats[seatA].pos, tableSize) < postflopIndex(seats[seatB].pos, tableSize) ? seatA : seatB;
    const secondActor = firstActor === seatA ? seatB : seatA;

    let board = [];
    const drawFrom = (n) => {
      const c = deck.slice(cursor, cursor + n);
      cursor += n;
      return c;
    };

    const streets = [{ name: 'flop', n: 3 }, { name: 'turn', n: 1 }, { name: 'river', n: 1 }];

    for (const s of streets) {
      board = board.concat(drawFrom(s.n));
      const streetResult = playStreet({
        street: s.name, board, seats, seatKeyByPos, rangeState, snapshots,
        potBB, firstActor, secondActor, lastAggressorSeat, effStackBB, tableSize, rng, iterations,
      });
      potBB = streetResult.potBB;
      lastAggressorSeat = streetResult.lastAggressorSeat;
      if (streetResult.ended) {
        return finalize(seats, snapshots, board);
      }
    }
    return finalize(seats, snapshots, board);
  }

  function playStreet(args) {
    const { street, board, seats, rangeState, snapshots, firstActor, secondActor, effStackBB, tableSize, rng, iterations } = args;
    let potBB = args.potBB;
    let lastAggressorSeat = args.lastAggressorSeat;

    const roundContrib = { [firstActor]: 0, [secondActor]: 0 };
    let currentActor = firstActor;
    let otherActor = secondActor;
    let actionCount = 0;
    const deadCardsBase = [].concat(seats.opener.cards, seats.caller.cards, board);

    while (actionCount < 5) {
      const toCall = roundContrib[otherActor] - roundContrib[currentActor];
      const potNow = potBB + roundContrib[firstActor] + roundContrib[secondActor];
      const heroIsAggressor = lastAggressorSeat === currentActor;
      const heroInPosition = postflopIndex(seats[currentActor].pos, tableSize) > postflopIndex(seats[otherActor].pos, tableSize);

      const remainingStack = Math.max(0, effStackBB - (potBB - 1.5) / 2 - roundContrib[currentActor]);
      // ^ rough remaining-stack estimate: effective stack minus roughly-equal-share of pot committed so far this hand

      let decision = Postflop.decidePostflop({
        heroCards: seats[currentActor].cards,
        board,
        potBB: potNow,
        toCallBB: toCall,
        betBB: toCall,
        villainRange: rangeState[otherActor],
        heroIsAggressor,
        heroInPosition,
        iterations,
        rng,
      });

      // bound to a single raise per street to keep the tree tractable
      if (actionCount >= 3 && (decision.action === 'raise')) {
        decision = { ...decision, action: toCall > 0 ? 'call' : 'check', label: toCall > 0 ? `콜 ${toCall}bb` : '체크' };
      }

      // clamp bet/raise sizing to remaining stack (all-in)
      if ((decision.action === 'bet' || decision.action === 'raise') && decision.sizeBB > remainingStack + roundContrib[currentActor]) {
        decision = { ...decision, sizeBB: Math.round((remainingStack + roundContrib[currentActor]) * 10) / 10, label: `올인 ${Math.round((remainingStack + roundContrib[currentActor]) * 10) / 10}bb` };
      }

      snapshots.push({
        street,
        seatKey: currentActor,
        pos: seats[currentActor].pos,
        heroCards: seats[currentActor].cards,
        board: board.slice(),
        facing: { type: 'postflop', toCallBB: toCall, betBB: toCall, heroIsAggressor, heroInPosition },
        potBB: potNow,
        decision,
        tableSize,
        villainRangeSize: rangeState[otherActor] ? rangeState[otherActor].size : null,
        effStackBB,
      });

      if (decision.action === 'fold') {
        return { potBB: potNow, lastAggressorSeat, ended: true };
      }

      if (decision.action === 'check') {
        if (actionCount > 0 && toCall === 0) {
          // both players have now checked -> street closes
          potBB = potNow;
          return { potBB, lastAggressorSeat, ended: false };
        }
        // else: first check of the street, continue to other actor
      } else if (decision.action === 'call') {
        roundContrib[currentActor] = roundContrib[otherActor];
        rangeState[currentActor] = Postflop.narrowRangeForAction(rangeState[currentActor], board, deadCardsBase, 'call');
        potBB = potBB + roundContrib[firstActor] + roundContrib[secondActor];
        return { potBB, lastAggressorSeat, ended: false };
      } else if (decision.action === 'bet' || decision.action === 'raise') {
        roundContrib[currentActor] = decision.sizeBB;
        lastAggressorSeat = currentActor;
        const actionClass = decision.action === 'raise' ? 'raise' : betSizeActionClass(decision.sizeBB, potNow);
        rangeState[currentActor] = Postflop.narrowRangeForAction(rangeState[currentActor], board, deadCardsBase, actionClass);
      }

      // swap turn
      const tmp = currentActor;
      currentActor = otherActor;
      otherActor = tmp;
      actionCount++;
    }

    // safety fallback: close the street as-is
    potBB = potBB + roundContrib[firstActor] + roundContrib[secondActor];
    return { potBB, lastAggressorSeat, ended: false };
  }

  function finalize(seats, snapshots, finalBoard) {
    snapshots.forEach((s) => {
      if (s.effStackBB === undefined || s.effStackBB === null) {
        // preflop snapshots don't carry stack info yet; caller can attach if needed
      }
    });
    return { seats, snapshots, finalBoard };
  }

  /**
   * Pick a random decision point from a generated hand, optionally filtered by street.
   */
  function pickDecisionPoint(handResult, streetFilter, rng) {
    rng = rng || Math.random;
    let pool = handResult.snapshots;
    if (streetFilter && streetFilter !== 'all') {
      pool = pool.filter((s) => s.street === streetFilter);
    }
    if (pool.length === 0) return null;
    return pool[Math.floor(rng() * pool.length)];
  }

  return {
    preflopOrderFor, postflopOrderFor, postflopIndex, preflopIndex,
    generateHand, pickDecisionPoint,
  };
});
</script>
<script>
(function () {
  'use strict';

  var Core = window.PokerCore;
  var Preflop = window.PokerPreflop;
  var Postflop = window.PokerPostflop;
  var CFR = window.PokerCFR;

  var SUIT_SYMBOL = { s: '♠', h: '♥', d: '♦', c: '♣' };
  var SUIT_RED = { h: true, d: true, s: false, c: false };
  var STREET_LABEL = { preflop: '프리플랍', flop: '플랍', turn: '턴', river: '리버' };
  var ACTION_LABEL = { fold: '폴드', check: '체크', call: '콜', bet: '벳', raise: '레이즈', allin: '올인' };
  var CHART_RANKS = ['A', 'K', 'Q', 'J', 'T', '9', '8', '7', '6', '5', '4', '3', '2'];
  var PREFLOP_LEVEL_LABEL = { 0: '오픈', 1: '오픈', 2: '3벳', 3: '4벳' };

  var SETTINGS_KEY = 'claudepoker_settings_v2';

  var state = {
    tableSize: 6,
    gameType: 'cash',
    stackBB: 100,
    // hand.actions: flat chronological list of action strings ('fold'/'check'/'call'/'raise'/'bet'/'allin').
    // hand.board: 5 cards dealt up front (revealed progressively as streets advance). Replaying
    // this actions list from scratch (see replayHand) deterministically reconstructs the entire
    // hand state - this is what makes editing an earlier decision (rewinding via the history
    // strip) trivial: truncate the array and re-render, no separate invalidation logic needed.
    hand: { actions: [], board: [] },
  };

  // ---------- persistence (table size / game type / stack only - no stats, no scenario state) ----------
  function loadSettings() {
    try {
      var raw = localStorage.getItem(SETTINGS_KEY);
      if (raw) {
        var parsed = JSON.parse(raw);
        if (parsed.tableSize) state.tableSize = parsed.tableSize;
        if (parsed.gameType) state.gameType = parsed.gameType;
        if (parsed.stackBB) state.stackBB = parsed.stackBB;
      }
    } catch (e) {}
  }
  function saveSettings() {
    try {
      localStorage.setItem(SETTINGS_KEY, JSON.stringify({
        tableSize: state.tableSize, gameType: state.gameType, stackBB: state.stackBB,
      }));
    } catch (e) {}
  }

  function round1(n) { return Math.round(n * 10) / 10; }

  // ---------- card rendering ----------
  function cardHtml(card) {
    var rank = card[0] === 'T' ? '10' : card[0];
    var suit = card[1];
    var red = SUIT_RED[suit];
    return '<div class="card ' + (red ? 'red' : 'black') + '">' +
      '<span class="rank">' + rank + '</span><span class="suit">' + SUIT_SYMBOL[suit] + '</span>' +
      '</div>';
  }

  function chartCanonAt(row, col) {
    if (row === col) return CHART_RANKS[row] + CHART_RANKS[row];
    if (row < col) return CHART_RANKS[row] + CHART_RANKS[col] + 's';
    return CHART_RANKS[col] + CHART_RANKS[row] + 'o';
  }

  // Moves the top `pct`% of the 169 canonical hands (by hand strength) OUT of `raiseSet` and
  // INTO `allinSet`, but only for hands that were actually in raiseSet to begin with.
  function splitTopAsAllin(raiseSet, allinSet, pct) {
    var elite = Core.topPercent(pct);
    elite.forEach(function (canon) {
      if (raiseSet.has(canon)) {
        raiseSet.delete(canon);
        allinSet.add(canon);
      }
    });
  }

  // ---------- ICM pressure for tournament mode ----------
  // Used to just pretend the stack was ~15% shorter than it actually is as a stand-in for "more
  // ICM pressure" - a made-up number with no real ICM math behind it. Now computed for real via
  // poker-icm.js's Malmuth-Harville model (see Preflop.icmPremiumForTournament): how much extra
  // equity a call/stack-off needs to clear at a representative mid-stage MTT shape, fed directly
  // into the calling-equity thresholds and the push/fold shove width instead of faking a smaller
  // stack.
  function icmPremiumNow() {
    return state.gameType === 'tournament' ? Preflop.icmPremiumForTournament(state.stackBB) : 0;
  }

  // ---------- turn-order engine ----------
  // Replays a flat list of actions from scratch against real poker turn-order rules: a raise
  // reopens the betting round for every other live player (including anyone who already acted
  // this round), a round closes when the field runs out of players who still need to respond to
  // the last raise (or nobody has raised and everyone has acted once), and streets advance
  // automatically once a round closes - all the way to the river if nobody wins the pot
  // uncontested first. This is what fixes the "UTG opens, UTG1 3-bets, everyone else folds -
  // action should return to UTG" case: UTG is never removed from stillNeedToAct once UTG1's
  // 3-bet reopens the round for every live player except UTG1 itself.
  function nextStreetName(street) {
    return { preflop: 'flop', flop: 'turn', turn: 'river', river: 'done' }[street];
  }
  function boardCountFor(street) {
    return { preflop: 0, flop: 3, turn: 4, river: 5, done: 5 }[street];
  }

  // Total bb a position will have put in THIS STREET after taking a raise/bet/allin action.
  // Preflop uses the same flat, non-chip-perfect sizing constants the earlier situation-based
  // chart used (2.3bb open / 6.9bb 3bet / 16bb 4bet) - a deliberate simplification consistent
  // with this being a heuristic study tool rather than an exact-chip poker engine. Postflop bets
  // are ~65% pot, postflop raises are ~2.5x the bet they're raising over.
  function sizingForTurn(ctx) {
    if (ctx.action === 'allin') return { totalBB: ctx.stackBB };
    if (ctx.street === 'preflop') {
      if (ctx.level === 0) return { totalBB: 2.3 };
      if (ctx.level === 1) return { totalBB: 6.9 };
      return { totalBB: 16 }; // level 2 -> 4bet (level 3 is capped, no raise offered)
    }
    if (ctx.level === 0) return { totalBB: round1(ctx.potBB * 0.65) };
    return { totalBB: round1((ctx.currentBetBB || ctx.potBB * 0.65) * 2.5) };
  }

  function replayHand(actionsList, tableSize, stackBB, board5) {
    var preflopOrder = Preflop.positionsFor(tableSize);
    var postflopOrder = Preflop.postflopOrderFor(tableSize);
    var folded = {};
    var street = 'preflop';
    var level = 0; // 0=unopened/checked, 1=open/bet, 2=3bet/raise, 3=4bet (preflop-only cap)
    var aggressorPos = null; // current street's last raiser/bettor
    var handAggressorPos = null; // persists across streets (last preflop raiser, or later overridden postflop)
    var potBB = 1.5;
    var currentBetBB = 1.0; // BB's post is the initial preflop "bet" everyone must match
    var contributed = {};

    var sbPos = null, bbPos = null;
    preflopOrder.forEach(function (p) { if (p === 'SB') sbPos = p; if (p === 'BB') bbPos = p; });
    if (sbPos) contributed[sbPos] = 0.5;
    if (bbPos) contributed[bbPos] = 1.0;

    function order() { return street === 'preflop' ? preflopOrder : postflopOrder; }
    function liveOrder() { return order().filter(function (p) { return !folded[p]; }); }

    var stillNeedToAct = liveOrder().slice();
    var turns = [];
    var actionIdx = 0;
    var boardRevealed = [];
    // cursorIdx tracks the LAST actor's index within order() (the fixed table-order array for
    // the current street), so the search for who's next continues rotating clockwise from there
    // instead of always restarting at seat 0 - restarting at seat 0 was the original bug: after a
    // reopening raise from a LATE seat, the naive "first live+needs-to-act seat in table order"
    // scan would immediately jump back to an EARLY seat that also got reopened (e.g. UTG) instead
    // of continuing to the seats between the raiser and that early seat first (e.g. BTN/SB/BB),
    // which is not how real poker turn order works.
    var cursorIdx = -1;

    while (true) {
      var live = liveOrder();
      if (live.length <= 1) { street = 'done'; break; }

      var curOrder = order();
      var nextPos = null;
      var nextIdx = -1;
      for (var k = 1; k <= curOrder.length; k++) {
        var idx = (cursorIdx + k) % curOrder.length;
        var p = curOrder[idx];
        if (!folded[p] && stillNeedToAct.indexOf(p) !== -1) { nextPos = p; nextIdx = idx; break; }
      }

      if (nextPos === null) {
        if (street === 'river') { street = 'done'; break; }
        street = nextStreetName(street);
        boardRevealed = board5.slice(0, boardCountFor(street));
        level = 0;
        aggressorPos = null;
        currentBetBB = 0;
        contributed = {};
        stillNeedToAct = liveOrder();
        cursorIdx = -1;
        continue;
      }

      var toCallBB = round1(currentBetBB - (contributed[nextPos] || 0));

      if (actionIdx >= actionsList.length) {
        turns.push({
          pos: nextPos, street: street, level: level, action: null,
          potBB: potBB, toCallBB: toCallBB, currentBetBB: currentBetBB,
          aggressorPos: aggressorPos, handAggressorPos: handAggressorPos,
          liveOpponents: live.filter(function (x) { return x !== nextPos; }),
          board: boardRevealed.slice(),
        });
        break;
      }

      var thisActionIndex = actionIdx;
      var action = actionsList[actionIdx++];
      cursorIdx = nextIdx;
      var rec = {
        pos: nextPos, street: street, level: level, action: action,
        potBB: potBB, toCallBB: toCallBB, currentBetBB: currentBetBB,
        aggressorPos: aggressorPos, handAggressorPos: handAggressorPos,
        liveOpponents: live.filter(function (x) { return x !== nextPos; }),
        board: boardRevealed.slice(),
        // index into the flat actionsList this action came from - lets the UI truncate the
        // array to exactly "right before this decision" when the user wants to revise it.
        actionIndex: thisActionIndex,
      };
      stillNeedToAct.splice(stillNeedToAct.indexOf(nextPos), 1);

      if (action === 'fold') {
        folded[nextPos] = true;
      } else if (action === 'check') {
        // no chip movement
      } else if (action === 'call') {
        potBB = round1(potBB + toCallBB);
        contributed[nextPos] = currentBetBB;
      } else {
        // raise / bet / allin
        var sizing = sizingForTurn({
          street: street, level: level, potBB: potBB, toCallBB: toCallBB,
          currentBetBB: currentBetBB, stackBB: stackBB, action: action,
        });
        var newTotalBB = Math.max(sizing.totalBB, currentBetBB + 0.1);
        potBB = round1(potBB + (newTotalBB - (contributed[nextPos] || 0)));
        contributed[nextPos] = newTotalBB;
        currentBetBB = newTotalBB;
        aggressorPos = nextPos;
        handAggressorPos = nextPos;
        level = Math.min(level + 1, street === 'preflop' ? 3 : 2);
        stillNeedToAct = live.filter(function (x) { return x !== nextPos; });
        rec.sizeBB = newTotalBB;
      }
      turns.push(rec);
    }

    var pending = (turns.length && turns[turns.length - 1].action === null) ? turns[turns.length - 1] : null;
    return { turns: turns, board: board5, folded: folded, street: street, pending: pending };
  }

  // ---------- action vocabulary per (street, level) ----------
  // Postflop stays unaffected by stack-tier all-in framing (that's a preflop-only concept in this
  // engine, matching poker-preflop.js's stackTierAdjust which has no postflop equivalent).
  function actionsAvailable(street, level, allRaisesAreAllin) {
    if (street === 'preflop') {
      if (level === 0) return allRaisesAreAllin ? ['fold', 'allin'] : ['fold', 'raise'];
      if (level < 3) return allRaisesAreAllin ? ['fold', 'call', 'allin'] : ['fold', 'call', 'raise', 'allin'];
      return ['fold', 'call', 'allin'];
    }
    if (level === 0) return ['check', 'bet'];
    if (level < 2) return ['fold', 'call', 'raise', 'allin'];
    return ['fold', 'call', 'allin'];
  }

  // Reference pot size (bb) right before hero acts at each preflop level, matching the same
  // fixed sizing constants used throughout this file (open 2.3bb, 3bet 6.9bb, 4bet 16bb).
  var POT_BEFORE_LEVEL = [1.5, 3.8, 10.7, 24.4];

  // How much of a raise range should show as "allin" instead, as a plain function of how much
  // stack is left BEHIND that raise relative to the pot it creates (SPR) - not a fixed % or a
  // named stack-tier gate. A 3bet/4bet that leaves a huge stack-to-pot ratio behind (deep stack)
  // is a genuinely different action from shoving and should never get auto-labeled allin; one
  // that leaves almost nothing behind (SPR near 1) basically IS a shove already, so the whole
  // raise range converges to allin; in between, the fraction converts smoothly rather than
  // jumping at an arbitrary stack-size cutoff.
  function allinSplitPctForLevel(level, stackBB) {
    var raiseSizeBB = sizingForTurn({ street: 'preflop', level: level, stackBB: stackBB, action: 'raise' }).totalBB;
    var potAfter = POT_BEFORE_LEVEL[level] + raiseSizeBB;
    var stackBehind = Math.max(0, stackBB - raiseSizeBB);
    var spr = potAfter > 0 ? stackBehind / potAfter : 0;
    if (spr <= 1.0) return 100;
    if (spr >= 6.0) return 0;
    var t = (6.0 - spr) / (6.0 - 1.0); // 0 (deep) .. 1 (about to be committed anyway)
    return Math.round(t * t * 100);
  }

  // ---------- CFR-based preflop range buckets ----------
  // Replaces the old heuristic tables (OPEN_PCT_BY_SIZE-driven ranges + rank-band/equity-margin
  // mixing approximation) with a real regret-matching CFR+ solve - see poker-cfr.js for the full
  // derivation. One solve of the open->facing-open->facing-3bet->facing-4bet subgame, keyed by
  // (stackBB, numPlayersBehind of the ORIGINAL OPENER), serves all four of this app's preflop
  // "levels" at once: level 0 uses the solve's own HO node; levels 1-3 (facing an open/3bet/4bet)
  // reuse the SAME solve (keyed off the opener's seat, not the responder's) and read its VR/H3/VA
  // nodes respectively. This naturally produces genuine mixed frequencies (e.g. a borderline hand
  // showing 63% raise / 37% fold) instead of the old rank-band ramp approximation.
  //
  // How many players are still left to act behind a given position - this is what stands in for
  // "how many real opponents could still wake up with a hand" in the CFR villain-distribution
  // reweighting (see poker-cfr.js's fieldWeights). Same seat-counting idea already used inside
  // poker-preflop.js's calling-equity adjustment (order.length - 1 - order.indexOf(pos)).
  function playersBehindFor(pos, tableSize) {
    var order = Preflop.positionsFor(tableSize);
    var idx = order.indexOf(pos);
    return Math.max(1, order.length - 1 - (idx === -1 ? 0 : idx));
  }

  // The CFR game tree's "3bet"/"allin" actions are each a single fixed-size action (no separate
  // standard-raise-vs-shove distinction), but the UI still wants to cosmetically distinguish a
  // "raise" from a "allin" the same way the old heuristic did: the SPR-driven allinSplitPctForLevel
  // decides what % of the currently-aggressive range displays as allin, and (mirroring the old
  // splitTopAsAllin behavior) it's always the globally-strongest hands in that range that get the
  // allin label, not a uniform split across every hand's frequency.
  function cosmeticRaiseAllinSplit(committedSet, pct) {
    var raiseSet = new Set(committedSet), allinSet = new Set();
    if (pct >= 100) { allinSet = raiseSet; raiseSet = new Set(); }
    else if (pct > 0) splitTopAsAllin(raiseSet, allinSet, pct);
    return { raiseSet: raiseSet, allinSet: allinSet };
  }

  function pct1dp(p) { return Math.round(p * 1000) / 10; } // probability (0..1) -> % with 1 decimal

  // CFR's average-strategy estimate at an infoset is only meaningful in proportion to how often
  // the ACTING player's own prior strategy actually visits it (that's what the average-strategy
  // accumulator is weighted by - see poker-cfr.js). For a hand that essentially never takes the
  // action that leads there in the first place (e.g. 72o almost never opens, so it almost never
  // reaches "facing a 3bet" as the opener), that downstream infoset gets no real learning signal
  // and its average strategy is just numerical noise around a uniform default - NOT a genuine
  // equilibrium mixed frequency. Below this reach-probability floor, skip trusting the raw
  // average and fall back to the obviously-correct answer (fold) instead.
  var REACH_FLOOR = 0.01;

  // VR and VA are both indexed by the RESPONDER'S hand ("vi" in poker-cfr.js), whose reach into
  // those infosets is driven by fieldWeights(numBehind), not by any of the solved strategy
  // arrays. At high numBehind the "best of N" reweighting pushes weak hands' field weight to
  // literal floating-point underflow (e.g. 72o at N=8 is ~4.5e-17) - CFR never gets a real update
  // for that hand's VR/VA nodes at all, so (unlike H3, which is correctly gated on hero's own
  // solved HO frequency) these two need their own separate field-weight-based floor.
  var FIELD_REACH_FLOOR = 1e-5;

  // ---------- preflop range buckets for the position currently on turn (CFR-driven) ----------
  function computePreflopBuckets(pos, level, aggressorPos, tableSize, stackBB) {
    var raiseSet = new Set(), callSet = new Set(), allinSet = new Set(), freq = {};
    var openerPos = (level === 0 || level === 2) ? pos : aggressorPos;
    var numBehind = playersBehindFor(openerPos, tableSize);
    var solved = CFR.solve(stackBB, numBehind);
    var fieldW = CFR.fieldWeights(numBehind);
    var isAllinAction = Preflop.stackTierAdjust(stackBB).allRaisesAreAllin;

    if (level === 0) {
      var aggressiveActionName0 = isAllinAction ? 'allin' : 'raise';
      var committed0 = new Set();
      Core.RANKED_169.forEach(function (canon) {
        var idx = Core.RANK_INDEX[canon];
        var pFold = solved.HO[idx * 2], pRaise = solved.HO[idx * 2 + 1];
        var entry = {};
        if (pRaise > 0.001) entry[aggressiveActionName0] = pct1dp(pRaise);
        if (pFold > 0.001) entry.fold = pct1dp(pFold);
        freq[canon] = entry;
        if (pRaise > 0.5) committed0.add(canon);
      });
      if (isAllinAction) { allinSet = committed0; } else { raiseSet = committed0; }
    } else if (level === 1) {
      var committed1 = new Set();
      Core.RANKED_169.forEach(function (canon) {
        var idx = Core.RANK_INDEX[canon];
        var b = idx * 3;
        var entry;
        if (fieldW[idx] < FIELD_REACH_FLOOR) {
          // this hand is essentially never the strongest of numBehind live players' hands in the
          // first place - never-reached infoset, don't trust VR's noisy average strategy for it.
          entry = { fold: 100 };
        } else {
          entry = {};
          var pFold = solved.VR[b], pCall = solved.VR[b + 1], pThree = solved.VR[b + 2];
          if (pFold > 0.001) entry.fold = pct1dp(pFold);
          if (pCall > 0.001) entry.call = pct1dp(pCall);
          if (pThree > 0.001) entry.raise = pct1dp(pThree);
          // set membership (drives the header count line) requires a DOMINANT share, same
          // convention as level 0's committed0 - a hand with a small residual call/3bet mix
          // shouldn't inflate the "N hands call/3bet" summary count.
          if (pCall > 0.5) callSet.add(canon);
          if (pThree > 0.5) committed1.add(canon);
        }
        freq[canon] = entry;
      });
      var pct1 = allinSplitPctForLevel(1, stackBB);
      var split1 = cosmeticRaiseAllinSplit(committed1, pct1);
      raiseSet = split1.raiseSet; allinSet = split1.allinSet;
      allinSet.forEach(function (canon) { if (freq[canon] && freq[canon].raise) { freq[canon].allin = freq[canon].raise; delete freq[canon].raise; } });
    } else if (level === 2) {
      var committed2 = new Set();
      Core.RANKED_169.forEach(function (canon) {
        var idx = Core.RANK_INDEX[canon];
        var b = idx * 3;
        var entry = {};
        if (solved.HO[idx * 2 + 1] < REACH_FLOOR) {
          // hero essentially never opens this hand in the first place - never-reached infoset,
          // don't trust H3's noisy average strategy for it (see REACH_FLOOR comment above).
          entry.fold = 100;
        } else {
          var pFold = solved.H3[b], pCall = solved.H3[b + 1], pAllin = solved.H3[b + 2];
          if (pFold > 0.001) entry.fold = pct1dp(pFold);
          if (pCall > 0.001) entry.call = pct1dp(pCall);
          if (pAllin > 0.001) entry.raise = pct1dp(pAllin);
          if (pCall > 0.5) callSet.add(canon);
          if (pAllin > 0.5) committed2.add(canon);
        }
        freq[canon] = entry;
      });
      var pct2 = allinSplitPctForLevel(2, stackBB);
      var split2 = cosmeticRaiseAllinSplit(committed2, pct2);
      raiseSet = split2.raiseSet; allinSet = split2.allinSet;
      allinSet.forEach(function (canon) { if (freq[canon] && freq[canon].raise) { freq[canon].allin = freq[canon].raise; delete freq[canon].raise; } });
    } else {
      // level 3: facing a 4bet. The CFR model already sizes the 4bet-shove (H3's "allin" branch)
      // to the full remaining stack, so VA's "call" IS an all-in call by construction - there's no
      // separate smaller call size left to distinguish, matching this level's original "bounded
      // model: call or allin only, no 5bet" framing exactly, just derived from the solve instead
      // of asserted.
      Core.RANKED_169.forEach(function (canon) {
        var idx = Core.RANK_INDEX[canon];
        var b = idx * 2;
        var entry = {};
        if (fieldW[idx] < FIELD_REACH_FLOOR) {
          // same underflow issue as VR above (VA is indexed by the same responder hand) - this
          // hand is essentially never the one that ends up 3-betting/continuing in the first
          // place, so don't trust VA's noisy average strategy for it.
          entry.fold = 100;
        } else {
          var pFold = solved.VA[b], pCall = solved.VA[b + 1];
          if (pFold > 0.001) entry.fold = pct1dp(pFold);
          if (pCall > 0.001) entry.allin = pct1dp(pCall);
          if (pCall > 0.5) allinSet.add(canon);
        }
        freq[canon] = entry;
      });
    }
    return { raiseSet: raiseSet, callSet: callSet, allinSet: allinSet, freq: freq };
  }

  // Reconstructs a still-live opponent's assumed range from their last preflop action, so
  // postflop decisions have something to narrow against. An approximation when multiple
  // opponents are still live (their ranges get unioned together), not exact multi-way equity.
  function deriveRangeForPos(pos, allTurns, tableSize, stackBB) {
    var last = null;
    for (var i = 0; i < allTurns.length; i++) {
      var t = allTurns[i];
      if (t.pos === pos && t.street === 'preflop' && t.action) last = t;
    }
    if (!last) return Core.topPercent(60);
    if (last.action === 'raise' || last.action === 'allin') {
      if (last.level === 0) return Preflop.openingRangeAtStack(pos, tableSize, stackBB);
      if (last.level === 1) return Preflop.threeBetRangeAtStack(pos, last.aggressorPos, tableSize, stackBB);
      return Preflop.fourBetRangeAtStack(pos, stackBB);
    }
    if (last.action === 'call') {
      if (last.level === 1) {
        var facingOpen = { type: 'open', openerPos: last.aggressorPos, sizeBB: 2.3, potBB: 3.8, toCallBB: 2.3 };
        return Preflop.rangeBucketsForFacing(pos, facingOpen, tableSize, { iterations: 150 }).call;
      }
      if (last.level === 2) {
        var facingThreeBet = { type: 'threebet', openerPos: pos, threebettorPos: last.aggressorPos, sizeBB: 6.9, potBB: 10.7, toCallBB: 4.6 };
        return Preflop.rangeBucketsForFacing(pos, facingThreeBet, tableSize, { iterations: 150 }).call;
      }
      if (last.level === 3) {
        var facingFourBet = { type: 'fourbet', fourbettorPos: last.aggressorPos, sizeBB: 16, potBB: 24.4, toCallBB: 9.1 };
        return Preflop.rangeBucketsForFacing(pos, facingFourBet, tableSize, { iterations: 150 }).call;
      }
    }
    return Core.topPercent(60);
  }

  function computePostflopBucketsForTurn(turn, allTurns, tableSize, stackBB) {
    var villainRange = new Set();
    turn.liveOpponents.forEach(function (p) {
      var r = deriveRangeForPos(p, allTurns, tableSize, stackBB);
      r.forEach(function (c) { villainRange.add(c); });
    });
    var postflopOrder = Preflop.postflopOrderFor(tableSize);
    var heroIdx = postflopOrder.indexOf(turn.pos);
    var heroInPosition = turn.liveOpponents.length > 0 && turn.liveOpponents.every(function (p) {
      return postflopOrder.indexOf(p) < heroIdx;
    });
    var heroIsAggressor = turn.pos === turn.handAggressorPos;
    var betBB = turn.toCallBB > 0 ? turn.toCallBB : round1(turn.potBB * 0.65);
    return Postflop.rangeBucketsOnBoard(turn.board, {
      potBB: turn.potBB, toCallBB: turn.toCallBB, betBB: betBB,
      villainRange: villainRange, heroIsAggressor: heroIsAggressor, heroInPosition: heroInPosition,
      iterations: 100, rng: Math.random,
    });
  }

  // ---------- rendering ----------
  // Fixed left-to-right stacking order for mixed-frequency cells, matching the legend order.
  var FREQ_ACTION_ORDER = ['raise', 'allin', 'call', 'fold'];
  var FREQ_ACTION_COLOR = { raise: '#c0442f', allin: '#9b2fd6', call: '#2f6f8f', fold: 'rgba(255,255,255,0.14)' };
  // Builds a proportional left-to-right split background for a hand's action-frequency entry,
  // e.g. {raise:70, allin:30} becomes a bar that's red for the first 70% and purple for the rest
  // - this is what actually shows the "not every hand is 100% one action" mixed strategy, instead
  // of collapsing every hand to whichever action happens to be most likely.
  function freqCellStyle(entry) {
    var stops = [];
    var acc = 0;
    FREQ_ACTION_ORDER.forEach(function (a) {
      var v = entry[a];
      if (v) {
        var next = acc + v;
        stops.push(FREQ_ACTION_COLOR[a] + ' ' + acc + '% ' + next + '%');
        acc = next;
      }
    });
    if (!stops.length) stops.push(FREQ_ACTION_COLOR.fold + ' 0% 100%');
    return 'background: linear-gradient(90deg, ' + stops.join(', ') + ');';
  }
  function freqCellTitle(canon, entry) {
    var parts = FREQ_ACTION_ORDER.filter(function (a) { return entry[a]; }).map(function (a) {
      return ACTION_LABEL[a] + ' ' + entry[a] + '%';
    });
    return canon + (parts.length ? ' — ' + parts.join(' · ') : '');
  }
  // A cell counts toward a given action's "dominant" class (for the fold-text-color rule below)
  // if that action is its single largest share.
  function freqDominantAction(entry) {
    var best = 'fold', bestPct = -1;
    FREQ_ACTION_ORDER.forEach(function (a) { if ((entry[a] || 0) > bestPct) { best = a; bestPct = entry[a] || 0; } });
    return best;
  }

  function renderPreflopGrid(buckets, labelPrefix) {
    var raiseSet = buckets.raiseSet, callSet = buckets.callSet, allinSet = buckets.allinSet, freq = buckets.freq || {};
    var html = '';
    for (var r = 0; r < 13; r++) {
      for (var c = 0; c < 13; c++) {
        var canon = chartCanonAt(r, c);
        var entry = freq[canon] || { fold: 100 };
        // dominant-action class kept for compatibility with anything that inspects "what does
        // this hand mostly do" (tests, legend counts) - the inline gradient background is what
        // actually shows the mix visually, the class just drives text color (muted for fold).
        var dominant = freqDominantAction(entry);
        var cls = 'action-' + dominant;
        html += '<div class="range-cell ' + cls + '" style="' + freqCellStyle(entry) + (dominant === 'fold' ? '' : ' color:#fff;') + '" title="' + freqCellTitle(canon, entry) + '">' + canon + '</div>';
      }
    }
    document.getElementById('range-grid').innerHTML = html;
    function pct(n) { return Math.round((n / 169) * 1000) / 10; }
    var info = (labelPrefix ? labelPrefix + ' — ' : '') + '레이즈 ' + raiseSet.size + '핸드 (' + pct(raiseSet.size) + '%)';
    if (allinSet.size) info += ' · 올인 ' + allinSet.size + '핸드 (' + pct(allinSet.size) + '%)';
    if (callSet.size) info += ' · 콜 ' + callSet.size + '핸드 (' + pct(callSet.size) + '%)';
    document.getElementById('chart-info').textContent = info;
    updateChartLegend('preflop');
  }

  function renderPostflopGrid(buckets, facingBet, labelPrefix) {
    var raiseSet = new Set();
    buckets.raise.forEach(function (c) { raiseSet.add(c); });
    buckets.bet.forEach(function (c) { raiseSet.add(c); });
    var foldSet = new Set();
    buckets.fold.forEach(function (c) { foldSet.add(c); });
    buckets.check.forEach(function (c) { foldSet.add(c); });
    var callSet = buckets.call;

    var html = '';
    for (var r = 0; r < 13; r++) {
      for (var c = 0; c < 13; c++) {
        var canon = chartCanonAt(r, c);
        var cls = raiseSet.has(canon) ? 'action-raise' : callSet.has(canon) ? 'action-call' : 'action-fold';
        html += '<div class="range-cell ' + cls + '" title="' + canon + '">' + canon + '</div>';
      }
    }
    document.getElementById('range-grid').innerHTML = html;
    function pct(n) { return Math.round((n / 169) * 1000) / 10; }
    var info = (labelPrefix ? labelPrefix + ' — ' : '') + (facingBet ? '레이즈 ' : '벳 ') + raiseSet.size + '핸드 (' + pct(raiseSet.size) + '%)';
    if (callSet.size) info += ' · 콜 ' + callSet.size + '핸드 (' + pct(callSet.size) + '%)';
    info += ' · ' + (facingBet ? '폴드 ' : '체크 ') + foldSet.size + '핸드 (' + pct(foldSet.size) + '%)';
    document.getElementById('chart-info').textContent = info;
    updateChartLegend(facingBet ? 'postflop-facingbet' : 'postflop-checked');
  }

  // Sizes #range-grid (in px, both dimensions) to exactly fill whichever is tighter - the
  // remaining width or height of its flex wrapper - so the 13x13 grid always stays square AND
  // the page never needs a scrollbar, regardless of viewport size or how tall the position strip
  // above it happens to be. CSS aspect-ratio alone can't guarantee this (it derives one dimension
  // from the other, so if that derived dimension overflows the wrapper the browser doesn't shrink
  // it back down to preserve the ratio - it just overflows and forces a scrollbar).
  function fitRangeGrid() {
    var wrap = document.querySelector('.chart-grid-wrap');
    var grid = document.getElementById('range-grid');
    if (!wrap || !grid) return;
    // Width and height are sized INDEPENDENTLY to each fill the wrapper exactly, rather than
    // both being forced to the smaller of the two to keep cells perfectly square. On a normal
    // wide monitor the wrapper is far wider than it is tall (height is what's limited by the
    // viewport), so a strictly-square grid left a large empty strip of unused width beside it
    // no matter how big the grid grew - cells are now rectangular (matching the wrapper's own
    // aspect ratio) so the whole available area is used instead of leaving that space empty.
    // No artificial minimum here on purpose: at very short viewports the grid must be allowed to
    // shrink as far as needed, because there's nowhere for the overflow to go (the whole app is
    // overflow:hidden - clipped content would be permanently inaccessible, which is worse than a
    // small grid).
    var w = Math.max(20, wrap.clientWidth - 2);
    var h = Math.max(20, wrap.clientHeight - 2);
    grid.style.width = w + 'px';
    grid.style.height = h + 'px';
  }

  function updateChartLegend(mode) {
    var raiseItem = document.getElementById('chart-legend-raise-item');
    var callItem = document.getElementById('chart-legend-call-item');
    var foldItem = document.getElementById('chart-legend-fold-item');
    var allinItem = document.getElementById('chart-legend-allin-item');
    var raiseLabel = document.getElementById('chart-legend-raise-label');
    var callLabel = document.getElementById('chart-legend-call-label');
    var foldLabel = document.getElementById('chart-legend-fold-label');

    allinItem.style.display = 'none';
    raiseItem.style.display = 'inline-flex';
    callItem.style.display = 'inline-flex';
    foldItem.style.display = 'inline-flex';

    if (mode === 'postflop-checked') {
      raiseLabel.textContent = '벳';
      foldLabel.textContent = '체크';
      callItem.style.display = 'none';
      return;
    }
    if (mode === 'postflop-facingbet') {
      raiseLabel.textContent = '레이즈';
      callLabel.textContent = '콜';
      foldLabel.textContent = '폴드';
      return;
    }
    raiseLabel.textContent = '레이즈';
    callLabel.textContent = '콜';
    foldLabel.textContent = '폴드';
    allinItem.style.display = 'inline-flex';
  }

  function actionButtonLabel(action, pending, stackBB) {
    if (action === 'fold') return '폴드';
    if (action === 'check') return '체크';
    if (action === 'call') return '콜' + (pending.toCallBB ? ' ' + round1(pending.toCallBB) + 'bb' : '');
    if (action === 'allin') return '올인 ' + round1(stackBB) + 'bb';
    var sizing = sizingForTurn({
      street: pending.street, level: pending.level, potBB: pending.potBB,
      toCallBB: pending.toCallBB, currentBetBB: pending.currentBetBB, stackBB: stackBB, action: 'raise',
    });
    var label = pending.street === 'preflop' ? '레이즈' : (pending.level === 0 ? '벳' : '레이즈');
    return label + ' ' + round1(sizing.totalBB) + 'bb';
  }

  function renderBoardDisplay(board) {
    var el = document.getElementById('hand-board-display');
    if (!board || !board.length) { el.innerHTML = ''; el.style.display = 'none'; return; }
    el.style.display = 'flex';
    el.innerHTML = board.map(cardHtml).join('');
  }

  // Short "what am I facing" hint shown inside each position card - used both for the real
  // pending decision and for 'upcoming' preview cards (which, since folds never change the
  // facing level/aggressor, face the EXACT same situation the pending position currently does).
  function facingHintFor(turn) {
    if (turn.street === 'preflop') {
      if (turn.level === 0) return '언오픈';
      if (turn.level === 1) return turn.aggressorPos + ' 오픈 대응';
      if (turn.level === 2) return turn.aggressorPos + ' 3벳 대응';
      return turn.aggressorPos + ' 4벳 대응';
    }
    return turn.level === 0 ? '체크 대기' : '벳 대응';
  }

  // For any position in the CURRENT street (not just the one actually on turn), figures out
  // what card-state to render:
  //  - 'pending'  - this position is the real next-to-act decision (result.pending).
  //  - 'decided'  - this position already has an action this street (possibly folded); its last
  //                 action-instance this street is reused verbatim (including its actionIndex,
  //                 which is what lets a click on this card revise the decision).
  //  - 'upcoming' - hasn't acted yet this street and isn't pending. Since fold never changes the
  //                 facing level/aggressor, an upcoming position faces an IDENTICAL situation to
  //                 whatever the pending position currently faces - so its preview just reuses
  //                 pending's context with pos swapped in.
  function findCardContext(pos, result) {
    if (result.pending && result.pending.pos === pos) {
      return { kind: 'pending', turn: result.pending, chosenAction: null };
    }
    var targetStreet = result.pending ? result.pending.street : null;
    var last = null;
    result.turns.forEach(function (t) {
      if (t.action !== null && t.pos === pos && (targetStreet ? t.street === targetStreet : true)) last = t;
    });
    if (last) return { kind: 'decided', turn: last, chosenAction: last.action };
    if (result.pending) {
      var p = result.pending;
      var pseudo = {
        pos: pos, street: p.street, level: p.level, potBB: p.potBB, toCallBB: p.toCallBB,
        currentBetBB: p.currentBetBB, aggressorPos: p.aggressorPos, handAggressorPos: p.handAggressorPos,
        board: p.board, liveOpponents: p.liveOpponents.filter(function (x) { return x !== pos; }).concat([p.pos]),
      };
      return { kind: 'upcoming', turn: pseudo, chosenAction: null };
    }
    return null;
  }

  // ---------- position strip: every seat in the current street, all at once ----------
  // Clicking an action button on a NOT-YET-DECIDED position later in turn order than the actual
  // pending one auto-folds every position in between (using the real engine, one simulated fold
  // at a time, so real reopening rules still apply) - this is the "click BTN's Raise/Fold and
  // everything before it is Fold" UX. Clicking an action button on an ALREADY-decided position
  // revises it (truncates back to right before that decision and re-applies).
  function renderPositionStrip(result) {
    var stripEl = document.getElementById('pos-strip');
    if (!result.pending) { stripEl.innerHTML = ''; return; }
    var tableSize = state.tableSize;
    var stackBB = state.stackBB;
    var targetStreet = result.pending.street;
    var order = targetStreet === 'preflop'
      ? Preflop.positionsFor(tableSize)
      : Preflop.postflopOrderFor(tableSize).filter(function (p) { return !result.folded[p]; });
    var allRaisesAreAllin = targetStreet === 'preflop' && Preflop.stackTierAdjust(stackBB).allRaisesAreAllin;

    var html = order.map(function (pos) {
      var ctx = findCardContext(pos, result);
      if (!ctx) return '';
      var statusCls = ctx.kind === 'pending' ? 'active'
        : ctx.kind === 'upcoming' ? 'upcoming'
        : (ctx.chosenAction === 'fold' ? 'decided folded' : 'decided');
      var isFocused = state.focusPos ? state.focusPos === pos : ctx.kind === 'pending';
      var actions = actionsAvailable(ctx.turn.street, ctx.turn.level, allRaisesAreAllin);
      var buttonsHtml = actions.map(function (a) {
        var chosen = ctx.chosenAction === a;
        return '<button type="button" class="pos-action-btn action-' + a + (chosen ? ' chosen' : '') + '" data-pos="' + pos + '" data-action="' + a + '">' +
          actionButtonLabel(a, ctx.turn, stackBB) + '</button>';
      }).join('');
      var hint = ctx.kind === 'decided' ? (ACTION_LABEL[ctx.chosenAction] || ctx.chosenAction) : facingHintFor(ctx.turn);
      return '<div class="pos-card ' + statusCls + (isFocused ? ' focused' : '') + '" data-pos="' + pos + '">' +
        '<div class="pos-card-label">' + pos + '</div>' +
        '<div class="pos-card-hint">' + hint + '</div>' +
        '<div class="pos-card-actions">' + buttonsHtml + '</div></div>';
    }).join('');
    stripEl.innerHTML = html;
  }

  function onCardActionClick(pos, action) {
    var tableSize = state.tableSize, stackBB = state.stackBB, board = state.hand.board;
    var result = replayHand(state.hand.actions, tableSize, stackBB, board);
    if (!result.pending) return; // hand already over, strip isn't clickable
    var targetStreet = result.pending.street;

    var actions;
    if (result.pending.pos === pos) {
      // pos is the REAL next-to-act decision right now - just append. Important: pos may already
      // have an EARLIER action this street (e.g. UTG's original open, before a later 3bet
      // reopened the round) - that's a different, superseded decision, not "this" one, so it must
      // NOT be truncated back to here.
      actions = state.hand.actions.slice();
    } else {
      var existingIdx = -1;
      result.turns.forEach(function (t) {
        if (t.action !== null && t.street === targetStreet && t.pos === pos) existingIdx = t.actionIndex;
      });
      if (existingIdx !== -1) {
        // revise: truncate back to right before this position's own (current) decision this street
        actions = state.hand.actions.slice(0, existingIdx);
      } else {
        // jump ahead: auto-fold everyone the engine says must act before this position is reached
        actions = state.hand.actions.slice();
        var guard = 0;
        while (guard++ < 20) {
          var r = replayHand(actions, tableSize, stackBB, board);
          if (!r.pending || r.pending.pos === pos || r.pending.street !== targetStreet) break;
          actions.push('fold');
        }
      }
    }
    actions.push(action);
    state.hand.actions = actions;
    state.focusPos = null;
    renderHand();
  }

  function onCardFocusClick(pos) {
    state.focusPos = pos;
    renderHand();
  }

  function renderHandDone(result, tableSize) {
    document.getElementById('hand-turn-panel').style.display = 'none';
    document.getElementById('pos-strip').innerHTML = '';
    var panel = document.getElementById('hand-done-panel');
    panel.style.display = '';
    document.getElementById('hand-status-badge').textContent = '핸드 종료';
    var live = Preflop.positionsFor(tableSize).filter(function (p) { return !result.folded[p]; });
    if (live.length === 1) {
      panel.textContent = '🏆 ' + live[0] + ' 승리 — 나머지 전원 폴드';
    } else {
      panel.textContent = '리버까지 액션 종료 — 쇼다운 (' + live.join(', ') + ')';
    }
    // show whatever board was actually revealed by the time the hand ended (the last recorded
    // action's `.board` snapshot already reflects that - empty if the hand never left preflop).
    renderBoardDisplay(result.turns.length ? result.turns[result.turns.length - 1].board : []);
  }

  function renderHand() {
    var tableSize = state.tableSize;
    var stackBB = state.stackBB;
    var result = replayHand(state.hand.actions, tableSize, stackBB, state.hand.board);

    if (result.street === 'done') {
      renderHandDone(result, tableSize);
      fitRangeGrid();
      return;
    }

    document.getElementById('hand-done-panel').style.display = 'none';
    document.getElementById('hand-turn-panel').style.display = '';
    renderPositionStrip(result);

    var pending = result.pending;
    document.getElementById('hand-status-badge').textContent =
      pending.pos + ' 차례 · ' + STREET_LABEL[pending.street] + ' · 팟 ' + round1(pending.potBB) + 'bb';
    renderBoardDisplay(pending.street === 'preflop' ? [] : pending.board);

    var focusPos = state.focusPos || pending.pos;
    var ctx = findCardContext(focusPos, result) || { kind: 'pending', turn: pending, chosenAction: null };
    renderGridAsync(ctx, result, tableSize, stackBB);
  }

  // The 169-hand equity/range computation (computePreflopBuckets / computePostflopBucketsForTurn)
  // takes a real ~1-1.5s on this machine, and since JS is single-threaded, running it directly
  // inside the click handler used to freeze the whole page for that entire time - no repaint, no
  // feedback, buttons feel unresponsive, then everything jumps at once when it's finally done.
  // Splitting it into two ticks fixes that: this tick shows a spinner and dims the old grid (so
  // the click's effect is felt IMMEDIATELY), then a setTimeout lets the browser actually paint
  // that before the heavy computation runs; once the new grid HTML is in, removing the loading
  // class fades it back in via the CSS transition on .range-grid instead of an abrupt swap.
  // gridRenderToken guards against a slow older computation clobbering a newer one if the user
  // clicks again before the first finishes.
  var gridRenderToken = 0;
  function renderGridAsync(ctx, result, tableSize, stackBB) {
    var token = ++gridRenderToken;
    var gridEl = document.getElementById('range-grid');
    var spinnerEl = document.getElementById('grid-spinner');
    gridEl.classList.add('grid-loading');
    if (spinnerEl) spinnerEl.style.display = 'flex';

    setTimeout(function () {
      if (token !== gridRenderToken) return; // superseded by a newer click - drop this result
      var labelPrefix = ctx.turn.pos + (ctx.kind === 'decided' ? ' (' + (ACTION_LABEL[ctx.chosenAction] || ctx.chosenAction) + ' 선택)' : '');
      if (ctx.turn.street === 'preflop') {
        renderPreflopGrid(computePreflopBuckets(ctx.turn.pos, ctx.turn.level, ctx.turn.aggressorPos, tableSize, stackBB), labelPrefix);
      } else {
        renderPostflopGrid(computePostflopBucketsForTurn(ctx.turn, result.turns, tableSize, stackBB), ctx.turn.toCallBB > 0, labelPrefix);
      }
      if (spinnerEl) spinnerEl.style.display = 'none';
      gridEl.classList.remove('grid-loading');
      fitRangeGrid();
    }, 20);
  }

  // ---------- hand lifecycle ----------
  function dealBoard() {
    var deck = Core.shuffle(Core.makeDeck(), Math.random);
    return deck.slice(0, 5);
  }
  function resetHand() {
    state.hand = { actions: [], board: dealBoard() };
    state.focusPos = null;
    renderHand();
  }

  // ---------- wire up ----------
  document.addEventListener('DOMContentLoaded', function () {
    loadSettings();
    document.getElementById('table-size-select').value = String(state.tableSize);
    document.getElementById('game-type-select').value = state.gameType;
    document.getElementById('stack-bb-input').value = state.stackBB;

    document.getElementById('table-size-select').addEventListener('change', function (e) {
      state.tableSize = Number(e.target.value) || 6;
      saveSettings();
      resetHand();
    });
    document.getElementById('game-type-select').addEventListener('change', function (e) {
      state.gameType = e.target.value;
      saveSettings();
      renderHand();
    });
    document.getElementById('stack-bb-input').addEventListener('change', function (e) {
      var v = Math.max(4, Math.min(300, Number(e.target.value) || 100));
      state.stackBB = v;
      e.target.value = v;
      saveSettings();
      resetHand();
    });
    document.getElementById('reset-hand-btn').addEventListener('click', resetHand);

    document.getElementById('pos-strip').addEventListener('click', function (e) {
      var btn = e.target.closest ? e.target.closest('.pos-action-btn') : null;
      if (btn) { onCardActionClick(btn.getAttribute('data-pos'), btn.getAttribute('data-action')); return; }
      var card = e.target.closest ? e.target.closest('.pos-card') : null;
      if (card) onCardFocusClick(card.getAttribute('data-pos'));
    });

    window.addEventListener('resize', fitRangeGrid);

    resetHand();
  });
})();
</script>
</body>
</html>
