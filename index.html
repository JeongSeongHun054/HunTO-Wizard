<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ClaudePoker Trainer</title>
<style>
  :root {
    --felt: #0b4d3a;
    --felt-dark: #073226;
    --panel: #142b24;
    --panel-2: #1b3a30;
    --accent: #d4a437;
    --accent-2: #4ba3ff;
    --good: #3fbf6f;
    --bad: #e0555a;
    --text: #eef4f0;
    --text-muted: #9db3ab;
    --card-red: #d3454a;
    --card-black: #1b1f1c;
    --radius: 12px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    background: radial-gradient(ellipse at top, var(--felt) 0%, var(--felt-dark) 70%);
    color: var(--text);
    min-height: 100vh;
    padding: 20px;
  }
  .app {
    max-width: 880px;
    margin: 0 auto;
  }
  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 18px;
  }
  header h1 {
    font-size: 1.4rem;
    margin: 0;
    letter-spacing: 0.5px;
  }
  header h1 span { color: var(--accent); }
  .icon-btn {
    background: var(--panel-2);
    border: 1px solid rgba(255,255,255,0.08);
    color: var(--text);
    border-radius: 8px;
    padding: 8px 14px;
    cursor: pointer;
    font-size: 0.85rem;
  }
  .icon-btn:hover { background: #234438; }

  #settings-panel {
    display: none;
    background: var(--panel);
    border-radius: var(--radius);
    padding: 16px 18px;
    margin-bottom: 16px;
    border: 1px solid rgba(255,255,255,0.06);
  }
  #settings-panel h3 { margin-top: 0; font-size: 0.95rem; color: var(--text-muted); }
  .settings-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
    gap: 12px;
    font-size: 0.9rem;
  }
  .settings-row select, .settings-row input {
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 0.9rem;
    width: 120px;
  }

  .stats-bar {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .stats-card {
    background: var(--panel);
    border-radius: var(--radius);
    padding: 10px 16px;
    flex: 1;
    min-width: 90px;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.06);
  }
  .stats-card .val { font-size: 1.3rem; font-weight: 700; color: var(--accent); }
  .stats-card .lbl { font-size: 0.72rem; color: var(--text-muted); margin-top: 2px; }
  #street-stats {
    background: var(--panel);
    border-radius: var(--radius);
    padding: 10px 16px;
    margin-bottom: 16px;
    border: 1px solid rgba(255,255,255,0.06);
    font-size: 0.82rem;
  }
  .street-stat-row {
    display: flex;
    justify-content: space-between;
    padding: 3px 0;
    color: var(--text-muted);
  }
  .street-stat-row span:first-child { color: var(--text); width: 70px; }

  #scenario-panel {
    background: linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
    border-radius: 16px;
    padding: 22px;
    border: 1px solid rgba(255,255,255,0.07);
    transition: opacity 0.15s ease;
  }
  .badge-row {
    display: flex;
    gap: 8px;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }
  .badge {
    background: var(--panel-2);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 0.78rem;
    color: var(--text-muted);
  }
  .badge b { color: var(--accent); font-size: 0.85rem; }

  .section-label {
    font-size: 0.72rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }
  #hero-cards, #board-cards {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }
  .card {
    width: 52px;
    height: 74px;
    background: #fdfdfb;
    border-radius: 7px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    box-shadow: 0 3px 8px rgba(0,0,0,0.35);
    font-weight: 700;
  }
  .card.red { color: var(--card-red); }
  .card.black { color: var(--card-black); }
  .card .rank { font-size: 1.05rem; line-height: 1; }
  .card .suit { font-size: 1.15rem; line-height: 1; }
  .card.empty {
    background: rgba(255,255,255,0.05);
    box-shadow: none;
    border: 1.5px dashed rgba(255,255,255,0.15);
  }
  #hero-cards .card { width: 60px; height: 84px; }

  #facing-box {
    background: rgba(0,0,0,0.2);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 20px;
    font-size: 0.92rem;
    line-height: 1.5;
    border-left: 3px solid var(--accent-2);
  }

  #action-buttons {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 6px;
  }
  .action-btn {
    flex: 1;
    min-width: 100px;
    padding: 13px 10px;
    border-radius: 10px;
    border: none;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    color: white;
    transition: transform 0.06s ease, opacity 0.15s ease;
  }
  .action-btn:active { transform: scale(0.97); }
  .action-fold { background: #55606b; }
  .action-check { background: #3d6f8f; }
  .action-call { background: #2f8f6f; }
  .action-bet, .action-raise { background: #c0442f; }
  .action-allin { background: linear-gradient(135deg, #ff512f, #b3006b); }
  .action-btn.disabled { pointer-events: none; opacity: 0.55; }
  .action-btn.correct-choice { outline: 3px solid var(--good); opacity: 1; }
  .action-btn.wrong-choice { outline: 3px solid var(--bad); opacity: 1; }

  .feedback-panel {
    margin-top: 18px;
    padding: 16px 18px;
    border-radius: 12px;
    font-size: 0.9rem;
    line-height: 1.6;
  }
  .feedback-correct { background: rgba(63,191,111,0.12); border: 1px solid rgba(63,191,111,0.4); }
  .feedback-wrong { background: rgba(224,85,90,0.12); border: 1px solid rgba(224,85,90,0.4); }
  .feedback-headline { font-size: 1.02rem; font-weight: 700; margin-bottom: 8px; }
  .feedback-recommend { margin-bottom: 10px; color: var(--text-muted); }
  .feedback-recommend strong { color: var(--accent); }
  .eq-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 6px;
    font-size: 0.82rem;
  }
  .eq-row span:first-child { width: 130px; color: var(--text-muted); flex-shrink: 0; }
  .eq-row span:last-child { width: 50px; text-align: right; flex-shrink: 0; }
  .eq-bar { flex: 1; height: 8px; background: rgba(255,255,255,0.08); border-radius: 4px; overflow: hidden; }
  .eq-fill { height: 100%; background: var(--accent-2); }
  .muted-row { color: var(--text-muted); font-size: 0.8rem; margin-bottom: 6px; }
  .reasons { margin: 10px 0 6px 0; padding-left: 20px; }
  .reasons li { margin-bottom: 4px; }
  .disclaimer-mini { font-size: 0.72rem; color: var(--text-muted); margin: 8px 0 0 0; }
  .icm-box {
    margin-top: 14px;
    padding: 12px 14px;
    border-radius: 10px;
    background: rgba(212,164,55,0.08);
    border: 1px solid rgba(212,164,55,0.35);
  }
  .icm-title { font-weight: 700; margin-bottom: 8px; color: var(--accent); font-size: 0.9rem; }
  .icm-reco { margin-top: 6px; font-size: 0.88rem; }
  .icm-reco strong { color: var(--accent); }

  #next-hand-btn {
    display: block;
    width: 100%;
    margin-top: 18px;
    padding: 14px;
    border-radius: 10px;
    border: none;
    background: var(--accent);
    color: #2a1e00;
    font-weight: 700;
    font-size: 1rem;
    cursor: pointer;
  }
  #next-hand-btn:disabled { opacity: 0.6; cursor: default; }
  #next-hand-btn:hover:not(:disabled) { filter: brightness(1.08); }

  #loading-indicator {
    display: none;
    align-items: center;
    justify-content: center;
    gap: 8px;
    color: var(--text-muted);
    font-size: 0.85rem;
    padding: 40px 0;
  }
  .muted { color: var(--text-muted); }

  footer {
    text-align: center;
    color: var(--text-muted);
    font-size: 0.72rem;
    margin-top: 22px;
    line-height: 1.6;
  }

  @media (max-width: 480px) {
    .card { width: 44px; height: 62px; }
    #hero-cards .card { width: 52px; height: 74px; }
    .action-btn { min-width: 80px; font-size: 0.85rem; padding: 12px 8px; }
  }

  .mode-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
  }
  .mode-tab {
    flex: 1;
    background: var(--panel);
    border: 1px solid rgba(255,255,255,0.08);
    color: var(--text-muted);
    border-radius: 10px;
    padding: 11px 10px;
    font-size: 0.88rem;
    font-weight: 600;
    cursor: pointer;
  }
  .mode-tab.active {
    background: var(--panel-2);
    color: var(--accent);
    border-color: var(--accent);
  }

  #custom-panel {
    background: linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
    border-radius: 16px;
    padding: 22px;
    border: 1px solid rgba(255,255,255,0.07);
  }
  #custom-panel h3 { margin-top: 0; font-size: 1rem; }
  #custom-panel .hint { color: var(--text-muted); font-size: 0.8rem; margin-top: -6px; margin-bottom: 16px; line-height: 1.5; }
  .form-section-label {
    font-size: 0.72rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin: 18px 0 8px 0;
  }
  .form-section-label:first-of-type { margin-top: 0; }
  .form-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 10px;
    font-size: 0.88rem;
  }
  .form-row > label { flex-shrink: 0; color: var(--text-muted); }
  .form-row select, .form-row input[type="number"] {
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 6px;
    padding: 7px 8px;
    font-size: 0.86rem;
    min-width: 130px;
  }
  .card-picker { display: inline-flex; gap: 4px; }
  .card-picker select { min-width: 58px; padding: 6px 4px; }
  .card-picker-pair, .card-picker-row { display: flex; gap: 10px; flex-wrap: wrap; }
  #c-error {
    background: rgba(224,85,90,0.15);
    border: 1px solid rgba(224,85,90,0.4);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 0.82rem;
    margin: 12px 0;
  }
  .primary-btn {
    display: block;
    width: 100%;
    margin-top: 16px;
    padding: 14px;
    border-radius: 10px;
    border: none;
    background: var(--accent);
    color: #2a1e00;
    font-weight: 700;
    font-size: 1rem;
    cursor: pointer;
  }
  .primary-btn:hover { filter: brightness(1.08); }
  .custom-tag {
    display: inline-block;
    background: rgba(212,164,55,0.15);
    color: var(--accent);
    border: 1px solid rgba(212,164,55,0.4);
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 0.72rem;
    margin-bottom: 10px;
  }

  #chart-panel {
    background: linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
    border-radius: 16px;
    padding: 22px;
    border: 1px solid rgba(255,255,255,0.07);
    display: flex;
    flex-direction: column;
  }
  #chart-panel > h3 { margin: 0 0 6px 0; font-size: 1rem; flex: 0 0 auto; }
  .chart-controls {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    margin-bottom: 14px;
  }
  .chart-controls .form-row { margin-bottom: 0; flex: 1; min-width: 140px; }
  .chart-controls select { width: 100%; min-width: 0; }
  .chart-legend {
    display: flex;
    gap: 16px;
    align-items: center;
    margin-bottom: 8px;
    font-size: 0.78rem;
    color: var(--text-muted);
    flex-wrap: wrap;
    flex: 0 0 auto;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-swatch { width: 12px; height: 12px; border-radius: 3px; display: inline-block; }
  #chart-info {
    font-size: 0.78rem;
    color: var(--text-muted);
    margin-bottom: 8px;
    flex: 0 0 auto;
    min-height: 1.1em;
  }
  .chart-grid-wrap {
    flex: 1 1 auto;
    min-height: 0;
    min-width: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  /* width/height are set inline in px by fitRangeGrid() (app.js) so the grid always fits the
     remaining flex space exactly - CSS aspect-ratio + max-width/max-height alone can't guarantee
     "shrink to whichever dimension is tighter" without occasionally overflowing and forcing a
     scrollbar, which is exactly what the no-scroll layout must avoid. */
  .range-grid {
    display: grid;
    grid-template-columns: repeat(13, 1fr);
    grid-template-rows: repeat(13, 1fr);
    gap: 1px;
    flex: 0 0 auto;
  }
  .range-cell {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(0.45rem, 1vw, 0.72rem);
    font-weight: 700;
    border-radius: 2px;
    letter-spacing: -0.3px;
  }
  .action-raise { background: #c0442f; color: #fff; }
  .action-call { background: #2f6f8f; color: #fff; }
  .action-fold { background: rgba(255,255,255,0.05); color: var(--text-muted); }

  .postflop-nav-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 6px 0 8px 0;
    flex-wrap: wrap;
  }
  .postflop-nav-row .primary-btn { margin-top: 0; }
  #chart-context-summary { font-size: 0.8rem; }

  /* ---- GTOWizard-style position strip + situation tabs (click-first chart UI) ---- */
  .chart-toprow {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 8px;
    font-size: 0.82rem;
  }
  .chart-tablesize-inline { display: flex; align-items: center; gap: 6px; color: var(--text-muted); flex-shrink: 0; }
  .chart-tablesize-inline b { color: var(--accent); }
  .chart-tablesize-inline select {
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 6px;
    padding: 5px 6px;
    font-size: 0.78rem;
  }
  .icon-btn.tiny { padding: 4px 9px; font-size: 0.7rem; }
  .to-flop-inline {
    background: var(--accent);
    color: #2a1e00;
    border: none;
    border-radius: 7px;
    padding: 5px 11px;
    font-size: 0.76rem;
    font-weight: 700;
    cursor: pointer;
  }
  .to-flop-inline:hover { filter: brightness(1.08); }
  .pos-strip {
    display: flex;
    gap: 6px;
    margin-bottom: 4px;
    flex: 0 0 auto;
  }
  .pos-card {
    flex: 1;
    min-width: 0;
    background: var(--panel-2);
    border: 1.5px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    padding: 7px 6px 8px 6px;
    color: var(--text);
    text-align: center;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .pos-card:hover { border-color: rgba(212,164,55,0.5); }
  .pos-card.selected,
  .pos-card.focused {
    border-color: var(--accent);
    background: rgba(212,164,55,0.14);
  }
  .pos-card.active { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent) inset; }
  .pos-card.upcoming { opacity: 0.58; }
  .pos-card.decided { border-style: solid; opacity: 0.9; }
  .pos-card.folded { opacity: 0.5; }
  .pos-card.decided:hover, .pos-card.upcoming:hover, .pos-card.folded:hover { opacity: 1; }
  .pos-card-label {
    font-size: 0.85rem;
    font-weight: 700;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .pos-card-hint {
    font-size: 0.65rem;
    color: var(--text-muted);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    padding-bottom: 3px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .pos-card-actions {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .pos-action-btn {
    text-align: center;
    font-size: 0.68rem;
    font-weight: 700;
    border: 1px solid transparent;
    border-radius: 4px;
    padding: 2.5px 2px;
    cursor: pointer;
    background: rgba(255,255,255,0.04);
    font-family: inherit;
  }
  .pos-action-btn.action-fold { color: var(--text-muted); }
  .pos-action-btn.action-raise { color: #ff8a75; }
  .pos-action-btn.action-call { color: #7ec3f2; }
  .pos-action-btn.action-allin { color: #ff7fc4; }
  .pos-action-btn:hover:not(:disabled) { background: rgba(255,255,255,0.1); }
  /* chosen state: fill with the action's own bright color, dark text on top. Deliberately spelled
     out per-action instead of `background: currentColor` - currentColor resolves against this
     SAME rule's own color declaration (not the .action-* rule's), which would collapse background
     and text to the same near-black value and make the chosen button unreadable. */
  .pos-action-btn.chosen.action-fold { background: var(--text-muted); color: #0d1a14; border-color: rgba(255,255,255,0.3); }
  .pos-action-btn.chosen.action-raise { background: #ff8a75; color: #0d1a14; border-color: rgba(255,255,255,0.3); }
  .pos-action-btn.chosen.action-call { background: #7ec3f2; color: #0d1a14; border-color: rgba(255,255,255,0.3); }
  .pos-action-btn.chosen.action-allin { background: #ff7fc4; color: #0d1a14; border-color: rgba(255,255,255,0.3); }
  .pos-action-btn:disabled {
    opacity: 0.28;
    cursor: not-allowed;
  }
  .pos-card.skeleton .pos-card-actions { color: var(--text-muted); animation: pos-skeleton-pulse 1s ease-in-out infinite; }
  @keyframes pos-skeleton-pulse { 0%, 100% { opacity: 0.35; } 50% { opacity: 0.75; } }

  .chart-postflop-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px 16px;
  }
  .chart-postflop-grid .form-row { margin-bottom: 0; }
  .chart-postflop-grid .form-row.span2 { grid-column: 1 / -1; }

  /* ---- single-view app shell: fixed-viewport, no vertical scroll, ever ---- */
  html, body { height: 100%; overflow: hidden; }
  .app {
    max-width: 1220px;
    width: 100%;
    height: 100vh;
    padding: 12px 22px 10px 22px;
    box-sizing: border-box;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 6px;
    overflow: hidden;
  }
  header { flex: 0 0 auto; margin-bottom: 0; flex-wrap: wrap; gap: 8px; }
  header h1 { font-size: 1.1rem; }

  .hand-toprow {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .hand-setting { display: flex; align-items: center; gap: 5px; font-size: 0.76rem; color: var(--text-muted); }
  .hand-setting select, .hand-setting input[type="number"] {
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 6px;
    padding: 4px 6px;
    font-size: 0.76rem;
  }
  .hand-setting input[type="number"] { width: 54px; }
  .hand-status {
    margin-left: auto;
    font-size: 0.78rem;
    font-weight: 700;
    color: var(--accent);
    background: rgba(212,164,55,0.12);
    border: 1px solid rgba(212,164,55,0.3);
    border-radius: 8px;
    padding: 4px 10px;
    white-space: nowrap;
  }

  .hand-board-display { display: flex; gap: 4px; flex: 0 0 auto; align-items: center; }
  .hand-board-display .card { width: 30px; height: 42px; }
  .hand-board-display .card .rank { font-size: 0.72rem; }
  .hand-board-display .card .suit { font-size: 0.78rem; }

  #pos-strip {
    flex: 0 0 auto;
    display: flex;
    gap: 5px;
  }

  #hand-turn-panel {
    flex: 1 1 auto;
    min-height: 0;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .hand-done-banner {
    flex: 1 1 auto;
    min-height: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--panel-2);
    border: 1.5px solid rgba(212,164,55,0.3);
    border-radius: 10px;
    padding: 16px;
    text-align: center;
    font-weight: 700;
    font-size: 1.1rem;
    color: var(--accent);
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>Claude<span>Poker</span> Range Chart</h1>
  </header>

  <div class="hand-toprow">
    <div class="hand-setting"><label>테이블</label>
      <select id="table-size-select">

        <option value="6">6-max</option>
        <option value="7">7-max</option>
        <option value="8">8-max</option>
        <option value="9">9-max (풀링)</option>

    </div>
    <div class="hand-setting"><label>게임</label>
      <select id="game-type-select">
        <option value="cash">캐시</option>

      </select>

    <div class="hand-setting"><label>스택(bb)</label>
      <input type="number" id="stack-bb-input" value="100" min="4" max="300" step="1" />
    </div>

    <div class="chart-legend">
      <span class="legend-item" id="chart-legend-raise-item"><span class="legend-swatch action-raise"></span><span id="chart-legend-raise-label">레이즈</span></span>
      <span class="legend-item" id="chart-legend-allin-item"><span class="legend-swatch action-allin"></span>올인</span>
      <span class="legend-item" id="chart-legend-call-item"><span class="legend-swatch action-call"></span><span id="chart-legend-call-label">콜</span></span>
      <span class="legend-item" id="chart-legend-fold-item"><span class="legend-swatch action-fold"></span><span id="chart-legend-fold-label">폴드</span></span>
    </div>

    <div class="chart-grid-wrap"><div class="range-grid" id="range-grid"></div></div>

<script>
// ===== ClaudePoker Core Engine =====
// Card/deck utilities, 7-card hand evaluator, Chen scoring, Monte Carlo equity.
// Designed to run identically in Node (for testing) and in-browser (inlined into the app).

(function (root, factory) {
  if (typeof module === 'object' && module.exports) {
    module.exports = factory();
  } else {
    root.PokerCore = factory();
  }
})(typeof self !== 'undefined' ? self : this, function () {
  'use strict';

  const RANKS = '23456789TJQKA';
  const SUITS = 'shdc'; // spades, hearts, diamonds, clubs
  const RANK_VAL = {}; // '2'->2 ... 'A'->14
  RANKS.split('').forEach((r, i) => (RANK_VAL[r] = i + 2));

  function makeDeck() {
    const deck = [];
    for (const r of RANKS) for (const s of SUITS) deck.push(r + s);
    return deck;
  }

  function shuffle(arr, rng) {
    rng = rng || Math.random;
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(rng() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function rankOf(card) {
    return RANK_VAL[card[0]];
  }
  function suitOf(card) {
    return card[1];
  }

  // ---- 5-card hand evaluator ----
  // Returns a comparable score array: [category, tiebreak1, tiebreak2, ...]
  // category: 8=straight flush,7=quads,6=full house,5=flush,4=straight,
  //           3=trips,2=two pair,1=pair,0=high card
  const CATEGORY_NAMES = [
    'High Card', 'Pair', 'Two Pair', 'Trips', 'Straight',
    'Flush', 'Full House', 'Quads', 'Straight Flush'
  ];

  function evaluate5(cards) {
    const ranks = cards.map(rankOf).sort((a, b) => b - a);
    const suits = cards.map(suitOf);
    const isFlush = suits.every((s) => s === suits[0]);

    // count ranks
    const counts = {};
    for (const r of ranks) counts[r] = (counts[r] || 0) + 1;
    const groups = Object.entries(counts)
      .map(([r, c]) => [Number(r), c])
      .sort((a, b) => (b[1] - a[1]) || (b[0] - a[0]));

    // straight detection (handle wheel A-2-3-4-5)
    const uniqRanks = [...new Set(ranks)];
    let straightHigh = 0;
    if (uniqRanks.length === 5) {
      if (uniqRanks[0] - uniqRanks[4] === 4) straightHigh = uniqRanks[0];
      else if (uniqRanks.join(',') === '14,5,4,3,2') straightHigh = 5; // wheel
    }

    if (straightHigh && isFlush) return [8, straightHigh];
    if (groups[0][1] === 4) {
      const kicker = groups[1][0];
      return [7, groups[0][0], kicker];
    }
    if (groups[0][1] === 3 && groups[1][1] === 2) {
      return [6, groups[0][0], groups[1][0]];
    }
    if (isFlush) return [5, ...ranks];
    if (straightHigh) return [4, straightHigh];
    if (groups[0][1] === 3) {
      const kickers = groups.slice(1).map((g) => g[0]).sort((a, b) => b - a);
      return [3, groups[0][0], ...kickers];
    }
    if (groups[0][1] === 2 && groups[1][1] === 2) {
      const pairs = [groups[0][0], groups[1][0]].sort((a, b) => b - a);
      const kicker = groups[2][0];
      return [2, ...pairs, kicker];
    }
    if (groups[0][1] === 2) {
      const kickers = groups.slice(1).map((g) => g[0]).sort((a, b) => b - a);
      return [1, groups[0][0], ...kickers];
    }
    return [0, ...ranks];
  }

  function cmpScore(a, b) {
    const len = Math.max(a.length, b.length);
    for (let i = 0; i < len; i++) {
      const av = a[i] || 0, bv = b[i] || 0;
      if (av !== bv) return av - bv;
    }
    return 0;
  }

  function combinations(arr, k) {
    const results = [];
    const combo = [];
    function rec(start) {
      if (combo.length === k) {
        results.push(combo.slice());
        return;
      }
      for (let i = start; i < arr.length; i++) {
        combo.push(arr[i]);
        rec(i + 1);
        combo.pop();
      }
    }
    rec(0);
    return results;
  }

  // best 5-card score out of 6 or 7 cards
  function evaluateBest(cards) {
    if (cards.length === 5) return { score: evaluate5(cards), cards };
    const combos = combinations(cards, 5);
    let best = null;
    for (const c of combos) {
      const score = evaluate5(c);
      if (!best || cmpScore(score, best.score) > 0) best = { score, cards: c };
    }
    return best;
  }

  function handCategoryName(score) {
    return CATEGORY_NAMES[score[0]];
  }

  // ---- Chen formula (starting hand strength heuristic) ----
  // Standard published formula, used here to rank the 169 starting hands
  // so we can derive believable position-based opening ranges without
  // hand-typing solver output.
  function chenScore(hand) {
    // hand: ['Ah','Kd'] etc.
    const r1 = rankOf(hand[0]);
    const r2 = rankOf(hand[1]);
    const suited = suitOf(hand[0]) === suitOf(hand[1]);
    const hi = Math.max(r1, r2);
    const lo = Math.min(r1, r2);

    const cardPoints = { 14: 10, 13: 8, 12: 7, 11: 6 };
    let score = cardPoints[hi] || hi / 2;

    if (r1 === r2) {
      score = Math.max(score * 2, 5);
    }
    if (suited) score += 2;

    const gap = hi - lo - 1; // cards between them
    if (r1 !== r2) {
      if (gap === 1) score -= 1;
      else if (gap === 2) score -= 2;
      else if (gap === 3) score -= 4;
      else if (gap >= 4) score -= 5;
      // straight bonus for connected/close cards below Q
      if (gap <= 1 && hi < 12) score += 1;
    }
    return Math.round(score * 2) / 2; // round to nearest 0.5
  }

  // Generate the 169 canonical starting hands, e.g. 'AKs', 'AKo', 'TT'
  function all169Hands() {
    const list = [];
    const order = RANKS.split('').reverse(); // A,K,Q,...,2
    for (let i = 0; i < order.length; i++) {
      for (let j = i; j < order.length; j++) {
        if (i === j) {
          list.push(order[i] + order[j]); // pair, e.g. 'AA'
        } else {
          list.push(order[i] + order[j] + 's');
          list.push(order[i] + order[j] + 'o');
        }
      }
    }
    return list;
  }

  function scoreOfCanonical(hand) {
    // hand like 'AKs','TT','72o' -> build representative 2 cards and score
    const r1 = hand[0], r2 = hand[1];
    const suited = hand.length === 3 ? hand[2] === 's' : true; // pairs: suited flag unused
    const c1 = r1 + 's';
    const c2 = suited ? r2 + 's' : r2 + 'h';
    return chenScore([c1, c2]);
  }

  // Rank all 169 hands descending by Chen score (ties broken by raw card rank sum)
  const RANKED_169 = all169Hands()
    .map((h) => ({ hand: h, score: scoreOfCanonical(h) }))
    .sort((a, b) => {
      if (b.score !== a.score) return b.score - a.score;
      // tie-break: pairs > suited > offsuit, then high card
      const rv = (h) => RANK_VAL[h[0]] + RANK_VAL[h[1]];
      return rv(b.hand) - rv(a.hand);
    })
    .map((x) => x.hand);

  const RANK_INDEX = {}; // hand -> percentile rank (0 = best)
  RANKED_169.forEach((h, i) => (RANK_INDEX[h] = i));

  function canonicalOf(cards) {
    // cards: ['Ah','Kd'] -> 'AKo' / ['Ah','Kh'] -> 'AKs' / ['Ah','Ad'] -> 'AA'
    const r1 = cards[0][0], r2 = cards[1][0];
    const v1 = RANK_VAL[r1], v2 = RANK_VAL[r2];
    const suited = suitOf(cards[0]) === suitOf(cards[1]);
    if (v1 === v2) return r1 + r2;
    const hi = v1 > v2 ? r1 : r2;
    const lo = v1 > v2 ? r2 : r1;
    return hi + lo + (suited ? 's' : 'o');
  }

  // percentile: 0 = best possible hand (AA), 1 = worst (72o)
  function percentileOf(cards) {
    const canon = canonicalOf(cards);
    return RANK_INDEX[canon] / (RANKED_169.length - 1);
  }

  // top X% of hands as a Set of canonical hand strings
  function topPercent(pct) {
    const n = Math.max(1, Math.round((pct / 100) * RANKED_169.length));
    return new Set(RANKED_169.slice(0, n));
  }

  // expand a set of canonical hands into concrete 2-card combos (for range-vs-range equity)
  function expandRangeToCombos(canonSet, deadCards) {
    const dead = new Set(deadCards || []);
    const combos = [];
    for (const canon of canonSet) {
      const r1 = canon[0], r2 = canon[1];
      const isPair = r1 === r2;
      const suitedOnly = canon[2] === 's';
      for (const s1 of SUITS) {
        for (const s2 of SUITS) {
          if (isPair && s1 >= s2) continue; // avoid dup pairs, unordered
          if (!isPair && canon.length === 3) {
            if (suitedOnly && s1 !== s2) continue;
            if (!suitedOnly && s1 === s2) continue;
          }
          const c1 = r1 + s1, c2 = r2 + s2;
          if (c1 === c2) continue;
          if (dead.has(c1) || dead.has(c2)) continue;
          combos.push([c1, c2]);
        }
      }
    }
    // dedupe (pairs might double up depending on suit loop bounds)
    const seen = new Set();
    const out = [];
    for (const [a, b] of combos) {
      const key = [a, b].sort().join('-');
      if (seen.has(key)) continue;
      seen.add(key);
      out.push([a, b]);
    }
    return out;
  }

  // ---- Monte Carlo equity: hero hand vs a weighted villain range, given known board ----
  function simulateEquity(heroCards, villainCombos, board, opts) {
    opts = opts || {};
    const iterations = opts.iterations || 300;
    const rng = opts.rng || Math.random;

    const usedByBoard = new Set([...heroCards, ...board]);
    // filter villain combos that conflict with hero/board
    const validCombos = villainCombos.filter(
      ([a, b]) => !usedByBoard.has(a) && !usedByBoard.has(b)
    );
    if (validCombos.length === 0) return { equity: 0.5, win: 0, tie: 0, lose: 0, n: 0 };

    let win = 0, tie = 0, lose = 0, n = 0;
    const fullDeck = makeDeck();

    for (let iter = 0; iter < iterations; iter++) {
      // pick a random villain combo each iteration (uniform over range)
      const combo = validCombos[Math.floor(rng() * validCombos.length)];
      const dead = new Set([...heroCards, ...board, ...combo]);
      const remaining = fullDeck.filter((c) => !dead.has(c));
      const needed = 5 - board.length;
      let runoutBoard = board.slice();
      if (needed > 0) {
        const shuffled = shuffle(remaining, rng);
        runoutBoard = board.concat(shuffled.slice(0, needed));
      }
      const heroBest = evaluateBest(heroCards.concat(runoutBoard));
      const villBest = evaluateBest(combo.concat(runoutBoard));
      const cmp = cmpScore(heroBest.score, villBest.score);
      if (cmp > 0) win++;
      else if (cmp === 0) tie++;
      else lose++;
      n++;
    }
    const equity = (win + tie / 2) / n;
    return { equity, win, tie, lose, n };
  }

  // Representative concrete cards for a canonical hand string, e.g. 'AKs' -> ['As','Ks'].
  function representativeCards(canon) {
    const r1 = canon[0], r2 = canon[1];
    if (r1 === r2) return [r1 + 's', r2 + 'h'];
    const suited = canon.length === 3 && canon[2] === 's';
    return suited ? [r1 + 's', r2 + 's'] : [r1 + 's', r2 + 'h'];
  }

  // Like representativeCards, but picks a concrete suit assignment that avoids a set of
  // dead cards (e.g. board cards on a specific flop/turn/river). Needed for postflop range
  // charts: representativeCards() always returns the same fixed suits ('s'/'h'), which will
  // collide with the board as soon as a specific board is pinned (e.g. canonical 'AKo' on a
  // board containing As would try to reuse As). Returns null only in the pathological case
  // where every suit combination for this rank pair is already dead (can't happen with a
  // legal <=5-card board, but guarded anyway).
  function representativeCardsAvoiding(canon, deadCards) {
    const dead = new Set(deadCards || []);
    const r1 = canon[0], r2 = canon[1];
    const isPair = r1 === r2;
    const suited = canon.length === 3 && canon[2] === 's';
    if (isPair) {
      for (const s1 of SUITS) {
        for (const s2 of SUITS) {
          if (s1 === s2) continue;
          const c1 = r1 + s1, c2 = r2 + s2;
          if (!dead.has(c1) && !dead.has(c2)) return [c1, c2];
        }
      }
      return null;
    }
    if (suited) {
      for (const s of SUITS) {
        const c1 = r1 + s, c2 = r2 + s;
        if (!dead.has(c1) && !dead.has(c2)) return [c1, c2];
      }
      return null;
    }
    for (const s1 of SUITS) {
      for (const s2 of SUITS) {
        if (s1 === s2) continue;
        const c1 = r1 + s1, c2 = r2 + s2;
        if (!dead.has(c1) && !dead.has(c2)) return [c1, c2];
      }
    }
    return null;
  }

  // ---- Memoized preflop equity: canonical hero hand vs a canonical villain range ----
  // Preflop (no board) equity for a given (heroCanon, villainRange) pair is deterministic
  // enough to cache - the same handful of position-based ranges recur across many generated
  // hands, so after a short warmup almost every lookup is a cache hit. This is the single
  // biggest lever for keeping "deal a new hand" snappy in the browser.
  const EQUITY_CACHE = new Map();
  function equityOfCanonicalVsRange(heroCanon, villainRangeSet, opts) {
    opts = opts || {};
    const iterations = opts.iterations || 300;
    const sig = heroCanon + '::' + [...villainRangeSet].sort().join(',') + '::' + iterations;
    if (EQUITY_CACHE.has(sig)) return EQUITY_CACHE.get(sig);
    const heroCards = representativeCards(heroCanon);
    const combos = expandRangeToCombos(villainRangeSet, heroCards);
    const result = simulateEquity(heroCards, combos, [], { iterations, rng: opts.rng || Math.random });
    EQUITY_CACHE.set(sig, result);
    return result;
  }

  return {
    RANKS, SUITS, RANK_VAL,
    makeDeck, shuffle, rankOf, suitOf,
    evaluate5, evaluateBest, cmpScore, handCategoryName, CATEGORY_NAMES,
    combinations,
    chenScore, all169Hands, RANKED_169, RANK_INDEX,
    canonicalOf, percentileOf, topPercent, expandRangeToCombos,
    simulateEquity, representativeCards, representativeCardsAvoiding, equityOfCanonicalVsRange,
  };
});
</script>
<script>
// ===== ClaudePoker ICM Module =====
// Real ICM (Independent Chip Model) equity via the standard Malmuth-Harville recursive model,
// implemented as an efficient bitmask DP: O(2^n * n) instead of the naive O(n!/(n-k)!)
// enumeration. Supports up to ~12 remaining players before the 2^n state space gets large
// (9 players -> 512 states, trivial).
//
// This computes each player's expected share of the prize pool ($EV) given everyone's chip
// stack and the payout structure - the actual tool used to reason about bubble/pay-jump
// situations, rather than a vague "risk premium" slider.

(function (root, factory) {
  if (typeof module === 'object' && module.exports) {
    module.exports = factory();
  } else {
    root.PokerICM = factory();
  }
})(typeof self !== 'undefined' ? self : this, function () {
  'use strict';

  function popcount(x) {
    let c = 0;
    while (x) {
      c += x & 1;
      x >>= 1;
    }
    return c;
  }

  function activeSum(stacks, mask) {
    let s = 0;
    for (let i = 0; i < stacks.length; i++) if (mask & (1 << i)) s += stacks[i];
    return s;
  }

  /**
   * Compute each player's ICM $EV given chip stacks and a payout structure.
   * @param {number[]} stacks - chip counts, one per remaining player (must be > 0)
   * @param {number[]} payouts - $ (or any consistent unit) paid to place 1, 2, 3... Places
   *                             beyond payouts.length receive 0.
   * @returns {number[]} expected $ value per player, same order/index as stacks
   */
  function icmEquity(stacks, payouts) {
    const n = stacks.length;
    if (n === 0) return [];
    if (n > 20) throw new Error('icmEquity: too many players for bitmask DP (max 20)');
    const numPayouts = Math.min(payouts.length, n);
    const fullMask = (1 << n) - 1;
    const equity = new Array(n).fill(0);
    const reachProb = new Array(1 << n).fill(0);
    reachProb[fullMask] = 1;

    const masks = [];
    for (let m = 1; m <= fullMask; m++) masks.push(m);
    masks.sort((a, b) => popcount(b) - popcount(a));

    for (const mask of masks) {
      const rp = reachProb[mask];
      if (!rp) continue;
      const placedSoFar = n - popcount(mask);
      const placeNumber = placedSoFar + 1; // 1-indexed place being decided at this step
      if (placeNumber > numPayouts) continue; // nothing left to pay out from here
      const sum = activeSum(stacks, mask);
      if (sum <= 0) continue;
      for (let i = 0; i < n; i++) {
        if (!(mask & (1 << i))) continue;
        const p = stacks[i] / sum;
        const prob = rp * p;
        equity[i] += prob * (payouts[placeNumber - 1] || 0);
        const nextMask = mask & ~(1 << i);
        reachProb[nextMask] += prob;
      }
    }
    return equity;
  }

  /**
   * Generate a normalized payout distribution (fractions of the prize pool summing to 1)
   * for `paidPlaces` places, shaped by `topHeaviness` (higher = more winner-take-most).
   * weight[i] = (paidPlaces - i) ^ topHeaviness, normalized.
   */
  function generatePayoutWeights(paidPlaces, topHeaviness) {
    const exp = topHeaviness || 1.6;
    const raw = [];
    for (let i = 0; i < paidPlaces; i++) raw.push(Math.pow(paidPlaces - i, exp));
    const sum = raw.reduce((a, b) => a + b, 0);
    return raw.map((w) => w / sum);
  }

  /**
   * ICM-aware call/fold analysis for a single all-in-style decision.
   * heroIdx/villainIdx point into `stacks`/`payouts` context; other players' stacks are
   * assumed unchanged by this particular hand.
   *
   * @param {object} p
   *   stacks: number[] - all remaining players' stacks in bb, hero first (index 0)
   *   payouts: number[] - payout fractions or $ per place
   *   heroIdx, villainIdx: indices into stacks for the two players in the hand (default 0, 1)
   *   potBB: pot already in middle before hero's call (bb)
   *   toCallBB: amount hero must add to call (bb)
   *   equity: hero's chip equity (0-1) to win the hand if called
   */
  function analyzeICMDecision(p) {
    const stacks = p.stacks.slice();
    const heroIdx = p.heroIdx === undefined ? 0 : p.heroIdx;
    const villainIdx = p.villainIdx === undefined ? 1 : p.villainIdx;
    const potBB = p.potBB || 0;
    const toCallBB = p.toCallBB || 0;
    const equity = p.equity;
    const payouts = p.payouts;

    const heroStack = stacks[heroIdx];
    const villainStack = stacks[villainIdx];
    const callAmount = Math.min(toCallBB, heroStack);
    const potAfterCall = potBB + callAmount;

    // Convention: `stacks` holds each player's CURRENT remaining stack, i.e. any chips already
    // wagered into potBB (by either player, on this or earlier streets) are NOT included in
    // either player's stack figure here - they're already "in the middle."
    // If hero calls and wins: hero collects the whole pot (potBB + their own call).
    // If hero calls and loses: villain collects the whole pot.
    const stacksWin = stacks.slice();
    stacksWin[heroIdx] = heroStack - callAmount + potAfterCall;
    stacksWin[villainIdx] = villainStack; // villain's remaining stack is unaffected by losing the pot

    const stacksLose = stacks.slice();
    stacksLose[heroIdx] = Math.max(0, heroStack - callAmount);
    stacksLose[villainIdx] = villainStack + potAfterCall;

    const stacksFold = stacks.slice(); // hero and villain stacks unchanged by folding

    function removeBusted(st) {
      // ICM requires positive stacks; treat 0-stack players as already eliminated (excluded
      // from the remaining-player equity calc, their payout is implicitly locked in below).
      const idxMap = [];
      const filtered = [];
      st.forEach((s, i) => {
        if (s > 0) {
          idxMap.push(i);
          filtered.push(s);
        }
      });
      return { filtered, idxMap };
    }

    function heroEquityFor(st) {
      const { filtered, idxMap } = removeBusted(st);
      if (idxMap.indexOf(heroIdx) === -1) return 0; // hero busted, gets nothing further
      const eq = icmEquity(filtered, payouts);
      const pos = idxMap.indexOf(heroIdx);
      return eq[pos];
    }

    const evCallWin = heroEquityFor(stacksWin);
    const evCallLose = heroEquityFor(stacksLose);
    const evCall = equity * evCallWin + (1 - equity) * evCallLose;
    const evFold = heroEquityFor(stacksFold);

    // binary search for the equity at which evCall === evFold (the ICM-adjusted breakeven)
    let lo = 0, hi = 1;
    for (let iter = 0; iter < 40; iter++) {
      const mid = (lo + hi) / 2;
      const evMid = mid * evCallWin + (1 - mid) * evCallLose;
      if (evMid < evFold) lo = mid; else hi = mid;
    }
    const icmRequiredEquity = (lo + hi) / 2;

    const chipRequiredEquity = (potBB + callAmount) > 0 ? callAmount / (potBB + callAmount) : 0;

    return {
      evCall, evFold, evCallWin, evCallLose,
      chipRequiredEquity, icmRequiredEquity,

        const conflict = combo.some((c) => dead.has(c));
        if (conflict) continue;
        const best = Core.evaluateBest(combo.concat(board));
        total += scoreToNumber(best.score);
        n++;
      }
      if (n === 0) continue;
      out.push({ canon, strength: total / n, comboCount: n });
    }
    out.sort((a, b) => b.strength - a.strength);
    return out;
  }

  // Narrow a range set given the action taken on this street.
  // action: 'bet_small' | 'bet_medium' | 'bet_big' | 'check' | 'call' | 'raise'
  function narrowRangeForAction(rangeSet, board, deadCards, action) {
    const ranked = rankRangeOnBoard(rangeSet, board, deadCards);
    if (ranked.length === 0) return new Set();
    const n = ranked.length;

    function topFraction(frac) {
      const count = Math.max(1, Math.round(n * frac));
      return new Set(ranked.slice(0, count).map((x) => x.canon));
    }
    function topAndBottom(topFrac, bottomFrac) {
      const topCount = Math.max(1, Math.round(n * topFrac));
      const bottomCount = Math.max(0, Math.round(n * bottomFrac));
      const s = new Set(ranked.slice(0, topCount).map((x) => x.canon));
      ranked.slice(Math.max(0, n - bottomCount)).forEach((x) => s.add(x.canon));
      return s;
    }

    switch (action) {
      case 'bet_small':
        return topAndBottom(0.55, 0.15); // merged/wide betting range
      case 'bet_medium':
        return topAndBottom(0.42, 0.12);
      case 'bet_big':
        return topAndBottom(0.3, 0.08); // polarized
      case 'raise':
        return topFraction(0.18);
      case 'call':
        return topFraction(0.75); // calling drops the bottom of the range
      case 'check':
      default:
        return new Set(rangeSet); // no new information
    }
  }

  function sizingForTexture(texture, strength) {
    // strength: 'value' | 'thin' | 'bluff'
    if (strength === 'value') {
      return texture.wetness > 0.55 ? 0.75 : 0.5;
    }
    if (strength === 'bluff') {
      return texture.wetness > 0.55 ? 0.66 : 0.33;
    }
    return 0.5;
  }

  // Facing a bet: given a precomputed equity result (eq) vs the (already narrowed) villain
  // betting range, decide fold/call/raise. Split out of decidePostflop so a range-chart render
  // can reuse the exact same thresholds across all 169 hands without re-deriving them.
  function decideFacingBet(heroCards, board, potBB, toCallBB, betBB, eq, texture, heroCategory, heroCategoryName, heroInPosition) {
    const potAfterCall = potBB + toCallBB;
    const requiredEquity = toCallBB / potAfterCall;
    const margin = eq.equity - requiredEquity;
    const isBigDraw = heroCategory <= 1 && eq.equity >= 0.36;

    if (margin < 0) {
      return {
        action: 'fold',
        label: '폴드',
        equity: eq.equity, requiredEquity, category: heroCategoryName, texture,
        reasons: [
          `현재 핸드는 ${heroCategoryName}, 상대 베팅 레인지 대비 추정 에퀴티 ${(eq.equity * 100).toFixed(1)}%.`,
          `팟오즈상 필요한 에퀴티는 ${(requiredEquity * 100).toFixed(1)}%로 부족합니다.`,
        ],
      };
    }

    if (margin >= 0.20 || heroCategory >= 5) {
      const sizeBB = Math.round(potAfterCall * sizingForTexture(texture, 'value') * 10) / 10;
      return {
        action: 'raise',
        label: `레이즈 ${sizeBB}bb`,
        sizeBB,
        equity: eq.equity, requiredEquity, category: heroCategoryName, texture,
        reasons: [
          `${heroCategoryName}로 상대 베팅 레인지 대비 에퀴티 ${(eq.equity * 100).toFixed(1)}%, 필요 에퀴티보다 여유가 큽니다.`,
          '밸류를 극대화하고 상대의 드로우/약한 핸드에 압박을 줄 수 있는 레이즈입니다.',
        ],
      };
    }

    if (isBigDraw && heroInPosition && margin >= 0.06) {
      const sizeBB = Math.round(potAfterCall * sizingForTexture(texture, 'bluff') * 10) / 10;
      return {
        action: 'raise',
        label: `세미블러프 레이즈 ${sizeBB}bb`,
        sizeBB,
        equity: eq.equity, requiredEquity, category: heroCategoryName, texture,
        reasons: [
          `메이드 핸드는 약하지만(${heroCategoryName}) 강한 드로우로 추정 에퀴티 ${(eq.equity * 100).toFixed(1)}%.`,
          '포지션 우위를 활용해 폴드 에퀴티를 추가로 얻는 세미블러프 레이즈입니다.',
        ],
      };
    }

    return {
      action: 'call',
      label: `콜 ${toCallBB}bb`,
      sizeBB: toCallBB,
      equity: eq.equity, requiredEquity, category: heroCategoryName, texture,
      reasons: [
        `${heroCategoryName}, 상대 베팅 레인지 대비 추정 에퀴티 ${(eq.equity * 100).toFixed(1)}% (필요 ${(requiredEquity * 100).toFixed(1)}%).`,
        '레이즈할 만큼 강하진 않지만 팟오즈상 콜이 이득인 핸드입니다.',
      ],
    };
  }

  // First to act / checked to hero: same split-out treatment as decideFacingBet above.
  function decideFirstIn(heroCards, board, potBB, eq, texture, heroCategory, heroCategoryName, heroIsAggressor) {
    const isDraw = heroCategory <= 1 && eq.equity >= 0.36;

    if (eq.equity >= 0.68 || heroCategory >= 3) {
      const sizeBB = Math.round(potBB * sizingForTexture(texture, 'value') * 10) / 10;
      return {
        action: 'bet',
        label: `벨류 베팅 ${sizeBB}bb`,
        sizeBB,
        equity: eq.equity, category: heroCategoryName, texture,
        reasons: [
          `${heroCategoryName}, 상대 레인지 대비 추정 에퀴티 ${(eq.equity * 100).toFixed(1)}%로 매우 우위에 있습니다.`,
          `보드 텍스처(${textureLabel(texture)})를 고려한 밸류 사이즈입니다.`,
        ],
      };
    }

    if (eq.equity >= 0.55) {
      const sizeBB = Math.round(potBB * sizingForTexture(texture, 'thin') * 10) / 10;
      return {
        action: 'bet',
        label: `씬밸류 베팅 ${sizeBB}bb`,
        sizeBB,
        equity: eq.equity, category: heroCategoryName, texture,
        reasons: [
          `${heroCategoryName}, 에퀴티 ${(eq.equity * 100).toFixed(1)}%로 괜찮은 우위가 있습니다.`,
          '얇은 밸류 베팅으로 상대의 약한 핸드에서 콜을 유도합니다.',
        ],
      };
    }

    if (heroIsAggressor && texture.wetness < 0.45 && eq.equity >= 0.40) {
      const sizeBB = Math.round(potBB * sizingForTexture(texture, 'bluff') * 10) / 10;
      return {
        action: 'bet',
        label: `컨티뉴에이션 벳 ${sizeBB}bb`,
        sizeBB,
        equity: eq.equity, category: heroCategoryName, texture,
        reasons: [
          '프리플랍 어그레서로서 드라이한 보드에서는 레인지 우위가 있습니다.',
          `추정 에퀴티 ${(eq.equity * 100).toFixed(1)}%, 작은 사이즈의 씨벳으로 폴드 에퀴티를 활용합니다.`,
        ],
      };
    }

    if (isDraw) {
      const sizeBB = Math.round(potBB * sizingForTexture(texture, 'bluff') * 10) / 10;
      return {
        action: 'bet',
        label: `세미블러프 베팅 ${sizeBB}bb`,
        sizeBB,
        equity: eq.equity, category: heroCategoryName, texture,
        reasons: [
          `${heroCategoryName}지만 강한 드로우로 추정 에퀴티 ${(eq.equity * 100).toFixed(1)}%.`,
          '베팅으로 폴드 에퀴티를 얻거나, 콜을 받아도 아웃츠로 만회할 수 있습니다.',
        ],
      };
    }

    return {
      action: 'check',
      label: '체크',
      equity: eq.equity, category: heroCategoryName, texture,
      reasons: [
        `${heroCategoryName}, 추정 에퀴티 ${(eq.equity * 100).toFixed(1)}%로 베팅할 만큼 강하지 않습니다.`,
        '주도권을 넘기고 팟을 작게 유지하며 다음 카드를 보는 편이 좋습니다.',
      ],
    };
  }

  /**
   * Decide hero's postflop action.
   * @param {object} p
   *   heroCards: string[2]
   *   board: string[] (3, 4, or 5 cards)
   *   potBB: number - pot size before hero acts
   *   toCallBB: number - 0 if hero is first to act / facing a check
   *   betBB: number - the villain's bet size if toCallBB > 0 (same as toCallBB in heads-up no-raise case)
   *   villainRange: Set<string> - canonical hands representing villain's range entering this street
   *   heroIsAggressor: boolean - was hero the preflop/last-street aggressor
   *   heroInPosition: boolean
   *   iterations, rng
   */
  function decidePostflop(p) {
    const {
      heroCards, board, potBB, toCallBB = 0, betBB = 0,
      villainRange, heroIsAggressor, heroInPosition,
    } = p;
    const iterations = p.iterations || 500;
    const rng = p.rng || Math.random;
    const deadCards = heroCards.concat(board);
    const texture = boardTexture(board);
    const heroBest = Core.evaluateBest(heroCards.concat(board));
    const heroCategory = heroBest.score[0];
    const heroCategoryName = Core.handCategoryName(heroBest.score);

    if (toCallBB > 0) {
      const betClass = classifyBetSize(betBB, potBB);
      const narrowed = narrowRangeForAction(villainRange, board, deadCards, `bet_${betClass}`);
      const combos = Core.expandRangeToCombos(narrowed, deadCards);
      const eq = Core.simulateEquity(heroCards, combos, board, { iterations, rng });
      return decideFacingBet(heroCards, board, potBB, toCallBB, betBB, eq, texture, heroCategory, heroCategoryName, heroInPosition);
    }

    const narrowedCheck = narrowRangeForAction(villainRange, board, deadCards, 'check');
    const combos = Core.expandRangeToCombos(narrowedCheck, deadCards);
    const eq = Core.simulateEquity(heroCards, combos, board, { iterations, rng });
    return decideFirstIn(heroCards, board, potBB, eq, texture, heroCategory, heroCategoryName, heroIsAggressor);
  }

  /**
   * Bucket all 169 canonical starting hands into fold/check/call/bet/raise on a FIXED board -
   * this is what powers the postflop range chart. The villain range is narrowed against the
   * board exactly once (it doesn't depend on which of the 169 hero hands we're evaluating),
   * instead of once per hand like decidePostflop would do if called 169 times naively - that's
   * the single biggest lever for keeping a full chart render fast.
   * @param {string[]} board
   * @param {object} opts - same shape as decidePostflop's `p`, minus heroCards
   */
  function rangeBucketsOnBoard(board, opts) {
    opts = opts || {};
    const potBB = opts.potBB || 10;
    const toCallBB = opts.toCallBB || 0;
    const betBB = opts.betBB || toCallBB;
    const villainRange = opts.villainRange || Core.topPercent(70);
    const heroIsAggressor = !!opts.heroIsAggressor;
    const heroInPosition = opts.heroInPosition !== false;
    const iterations = opts.iterations || 120;
    const rng = opts.rng || Math.random;

    const texture = boardTexture(board);
    const actionCtx = toCallBB > 0 ? `bet_${classifyBetSize(betBB, potBB)}` : 'check';
    const narrowed = narrowRangeForAction(villainRange, board, board, actionCtx);

    const buckets = { fold: new Set(), check: new Set(), call: new Set(), bet: new Set(), raise: new Set() };
    for (const canon of Core.RANKED_169) {
      const heroCards = Core.representativeCardsAvoiding(canon, board);
      if (!heroCards) continue; // pathological suit collision, skip this hand
      const combos = Core.expandRangeToCombos(narrowed, heroCards.concat(board));
      const eq = Core.simulateEquity(heroCards, combos, board, { iterations, rng });
      const heroBest = Core.evaluateBest(heroCards.concat(board));
      const heroCategory = heroBest.score[0];
      const heroCategoryName = Core.handCategoryName(heroBest.score);
      const result = toCallBB > 0
        ? decideFacingBet(heroCards, board, potBB, toCallBB, betBB, eq, texture, heroCategory, heroCategoryName, heroInPosition)
        : decideFirstIn(heroCards, board, potBB, eq, texture, heroCategory, heroCategoryName, heroIsAggressor);
      buckets[result.action].add(canon);
    }
    return buckets;
  }

  function textureLabel(t) {
    const parts = [];
    parts.push(t.wetness > 0.55 ? '웻(wet)' : t.wetness > 0.3 ? '중간' : '드라이(dry)');
    if (t.paired) parts.push('페어보드');
    if (t.flushPossible) parts.push('플러시 가능');
    return parts.join(', ');
  }

  return {
    scoreToNumber, boardTexture, classifyBetSize,
    rankRangeOnBoard, narrowRangeForAction, sizingForTexture,
    decidePostflop, rangeBucketsOnBoard, textureLabel,
  };
});

<script>
// ===== ClaudePoker Scenario Generator =====
// Simulates a full heads-up hand (preflop through river) using the engine's own bot logic
// for BOTH seats, recording every decision point along the way. The trainer then picks one
// recorded decision point at random and asks the human to make that call themselves.

(function (root, factory) {
  if (typeof module === 'object' && module.exports) {
    module.exports = factory(require('./poker-core.js'), require('./poker-preflop.js'), require('./poker-postflop.js'));
  } else {
    root.PokerScenario = factory(root.PokerCore, root.PokerPreflop, root.PokerPostflop);
  }
})(typeof self !== 'undefined' ? self : this, function (Core, Preflop, Postflop) {
  'use strict';

  // Preflop action order comes straight from Preflop.positionsFor(tableSize) (UTG..BTN,SB,BB).
  // Postflop order moves the blinds to the front: SB, BB, then everyone else in their
  // original order (BTN acts last on every postflop street).
  function preflopOrderFor(tableSize) {
    return Preflop.positionsFor(tableSize);
  }
  function postflopOrderFor(tableSize) {
    const order = Preflop.positionsFor(tableSize);
    const blinds = order.filter((p) => p === 'SB' || p === 'BB');
    const rest = order.filter((p) => p !== 'SB' && p !== 'BB');
    return blinds.concat(rest);
  }
  function postflopIndex(pos, tableSize) {
    return postflopOrderFor(tableSize).indexOf(pos);
  }
  function preflopIndex(pos, tableSize) {
    return preflopOrderFor(tableSize).indexOf(pos);
  }

  function pick(arr, rng) {
    return arr[Math.floor(rng() * arr.length)];
  }

  function betSizeActionClass(sizeBB, potBB) {
    return 'bet_' + Postflop.classifyBetSize(sizeBB, potBB);
  }

  /**
   * Generate one full simulated hand and return the list of decision-point snapshots.
   * opts: { tableSize, rng, iterations, minStackBB, maxStackBB, maxAttempts }
   */
  function generateHand(opts) {
    opts = opts || {};
    const tableSize = opts.tableSize || 6;
    const rng = opts.rng || Math.random;
    const iterations = opts.iterations || 300;
    const maxAttempts = opts.maxAttempts || 60;

    for (let attempt = 0; attempt < maxAttempts; attempt++) {
      const result = tryGenerateHand({ tableSize, rng, iterations, opts });
      if (result) return result;
    }
    return null;
  }

  function tryGenerateHand({ tableSize, rng, iterations, opts }) {
    const deck = Core.shuffle(Core.makeDeck(), rng);
    let cursor = 0;
    const draw = (n) => {
      const c = deck.slice(cursor, cursor + n);
      cursor += n;
      return c;
    };

    const minStack = opts.minStackBB || 25;
    const maxStack = opts.maxStackBB || 150;
    const effStackBB = Math.round(minStack + rng() * (maxStack - minStack));

    // pick opener + a caller who acts after opener preflop
    const preflopOrder = preflopOrderFor(tableSize);
    const openerPos = pick(preflopOrder.slice(0, preflopOrder.length - 1), rng); // everyone but BB can open
    const afterOpener = preflopOrder.slice(preflopIndex(openerPos, tableSize) + 1);
    const callerPos = pick(afterOpener, rng);

    const openerCards = draw(2);
    const callerCards = draw(2);

    const seats = {
      opener: { pos: openerPos, cards: openerCards },
      caller: { pos: callerPos, cards: callerCards },
    };
    const seatKeyByPos = { [openerPos]: 'opener', [callerPos]: 'caller' };

    const snapshots = [];
    const rangeState = {};
    let potBB = 1.5; // blinds baseline
    let lastAggressorSeat = null;
    let street = 'preflop';

    // --- ROUND 1: opener unopened ---
    const openDecision = Preflop.decidePreflop(seats.opener.cards, openerPos, { type: 'unopened' }, { tableSize, rng, iterations });
    snapshots.push(makePreflopSnapshot('opener', seats, { type: 'unopened' }, potBB, openDecision, tableSize, effStackBB));
    if (openDecision.action !== 'raise') return null; // bot correctly folds -> not an interesting hand, retry
    lastAggressorSeat = 'opener';
    const openSizeBB = openDecision.sizeBB;
    potBB += openSizeBB;
    rangeState.opener = Preflop.openingRange(openerPos, tableSize);

    // --- ROUND 2: caller facing open ---
    // potBB here already equals blinds(1.5) + opener's raise, i.e. the full pot before caller acts.
    const facingOpen = { type: 'open', openerPos, sizeBB: openSizeBB, potBB, toCallBB: openSizeBB };
    const callDecision = Preflop.decidePreflop(seats.caller.cards, callerPos, facingOpen, { tableSize, rng, iterations });
    snapshots.push(makePreflopSnapshot('caller', seats, facingOpen, potBB, callDecision, tableSize, effStackBB));

    if (callDecision.action === 'fold') {
      return finalize(seats, snapshots, null);
    }

    if (callDecision.action === 'call') {
      potBB += openSizeBB;
      const buckets = Preflop.rangeBucketsForFacing(callerPos, facingOpen, tableSize, { rng, iterations: 150 });
      rangeState.caller = buckets.call;
      return proceedToFlop({ seats, seatKeyByPos, rangeState, snapshots, potBB, lastAggressorSeat, effStackBB, tableSize, rng, iterations, deck, cursor });
    }

    // callDecision.action === 'raise' -> 3-bet
    lastAggressorSeat = 'caller';
    const threeBetSizeBB = callDecision.sizeBB;
    potBB += threeBetSizeBB;
    rangeState.caller = Preflop.threeBetRange(callerPos, openerPos, tableSize);

    // --- ROUND 3: opener facing 3bet ---
    // potBB already equals blinds + open + 3bet, i.e. the full pot before opener acts.
    // opener already has openSizeBB invested, so they only need to add the difference to call.
    const facingThreeBet = { type: 'threebet', openerPos, threebettorPos: callerPos, sizeBB: threeBetSizeBB, potBB, toCallBB: threeBetSizeBB - openSizeBB };
    const vs3betDecision = Preflop.decidePreflop(seats.opener.cards, openerPos, facingThreeBet, { tableSize, rng, iterations });
    snapshots.push(makePreflopSnapshot('opener', seats, facingThreeBet, potBB, vs3betDecision, tableSize, effStackBB));

    if (vs3betDecision.action === 'fold') {
      return finalize(seats, snapshots, null);
    }

    if (vs3betDecision.action === 'call') {
      potBB += threeBetSizeBB - openSizeBB;
      const buckets = Preflop.rangeBucketsForFacing(openerPos, facingThreeBet, tableSize, { rng, iterations: 150 });
      rangeState.opener = buckets.call;
      return proceedToFlop({ seats, seatKeyByPos, rangeState, snapshots, potBB, lastAggressorSeat, effStackBB, tableSize, rng, iterations, deck, cursor });
    }

    // vs3betDecision.action === 'raise' -> 4-bet
    lastAggressorSeat = 'opener';
    const fourBetSizeBB = vs3betDecision.sizeBB;
    potBB += fourBetSizeBB - openSizeBB;
    rangeState.opener = Preflop.fourBetRange(openerPos);

    // --- ROUND 4: caller facing 4bet (bounded - call or fold only) ---
    // potBB already equals blinds + open + 3bet + 4bet, i.e. the full pot before caller acts.
    // caller already has threeBetSizeBB invested, so they only need to add the difference to call.
    const facingFourBet = { type: 'fourbet', fourbettorPos: openerPos, sizeBB: fourBetSizeBB, potBB, toCallBB: fourBetSizeBB - threeBetSizeBB };
    const vs4betDecision = Preflop.decidePreflop(seats.caller.cards, callerPos, facingFourBet, { tableSize, rng, iterations });
    snapshots.push(makePreflopSnapshot('caller', seats, facingFourBet, potBB, vs4betDecision, tableSize, effStackBB));

    if (vs4betDecision.action !== 'call') {
      return finalize(seats, snapshots, null); // fold, or a rare 'raise' we don't model further -> treat as end
    }
    potBB += fourBetSizeBB - threeBetSizeBB;
    const buckets4 = Preflop.rangeBucketsForFacing(callerPos, facingFourBet, tableSize, { rng, iterations: 150 });
    rangeState.caller = buckets4.call;

    return proceedToFlop({ seats, seatKeyByPos, rangeState, snapshots, potBB, lastAggressorSeat, effStackBB, tableSize, rng, iterations, deck, cursor });
  }

  function makePreflopSnapshot(seatKey, seats, facing, potBBAfter, decision, tableSize, effStackBB) {
    const seat = seats[seatKey];
    return {
      street: 'preflop',
      seatKey,
      pos: seat.pos,
      heroCards: seat.cards,
      board: [],
      facing,
      potBB: facing.potBB !== undefined ? facing.potBB : 1.5,
      decision,
      tableSize,
      effStackBB,

  function proceedToFlop(ctx) {
    const { seats, seatKeyByPos, rangeState, snapshots, effStackBB, tableSize, rng, iterations } = ctx;
    let { potBB, lastAggressorSeat, deck, cursor } = ctx;

    const seatA = 'opener', seatB = 'caller';
    const firstActor = postflopIndex(seats[seatA].pos, tableSize) < postflopIndex(seats[seatB].pos, tableSize) ? seatA : seatB;
    const secondActor = firstActor === seatA ? seatB : seatA;

    let board = [];
    const drawFrom = (n) => {
      const c = deck.slice(cursor, cursor + n);
      cursor += n;
      return c;
    };

    const streets = [{ name: 'flop', n: 3 }, { name: 'turn', n: 1 }, { name: 'river', n: 1 }];

    for (const s of streets) {
      board = board.concat(drawFrom(s.n));
      const streetResult = playStreet({
        street: s.name, board, seats, seatKeyByPos, rangeState, snapshots,
        potBB, firstActor, secondActor, lastAggressorSeat, effStackBB, tableSize, rng, iterations,

      potBB = streetResult.potBB;
      lastAggressorSeat = streetResult.lastAggressorSeat;
      if (streetResult.ended) {
