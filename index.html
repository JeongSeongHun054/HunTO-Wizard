<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ClaudePoker Trainer</title>
<style>
  :root {
    --felt: #0b4d3a;
    --felt-dark: #073226;
    --panel: #142b24;
    --panel-2: #1b3a30;
    --accent: #d4a437;
    --accent-2: #4ba3ff;
    --good: #3fbf6f;
    --bad: #e0555a;
    --text: #eef4f0;
    --text-muted: #9db3ab;
    --card-red: #d3454a;
    --card-black: #1b1f1c;
    --radius: 12px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    background: radial-gradient(ellipse at top, var(--felt) 0%, var(--felt-dark) 70%);
    color: var(--text);
    min-height: 100vh;
    padding: 20px;
  }
  .app {
    max-width: 880px;
    margin: 0 auto;
  }
  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 18px;
  }
  header h1 {
    font-size: 1.4rem;
    margin: 0;
    letter-spacing: 0.5px;
  }
  header h1 span { color: var(--accent); }
  .icon-btn {
    background: var(--panel-2);
    border: 1px solid rgba(255,255,255,0.08);
    color: var(--text);
    border-radius: 8px;
    padding: 8px 14px;
    cursor: pointer;
    font-size: 0.85rem;
  }
  .icon-btn:hover { background: #234438; }

  #settings-panel {
    display: none;
    background: var(--panel);
    border-radius: var(--radius);
    padding: 16px 18px;
    margin-bottom: 16px;
    border: 1px solid rgba(255,255,255,0.06);
  }
  #settings-panel h3 { margin-top: 0; font-size: 0.95rem; color: var(--text-muted); }
  .settings-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
    gap: 12px;
    font-size: 0.9rem;
  }
  .settings-row select, .settings-row input {
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 0.9rem;
    width: 120px;
  }

  .stats-bar {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .stats-card {
    background: var(--panel);
    border-radius: var(--radius);
    padding: 10px 16px;
    flex: 1;
    min-width: 90px;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.06);
  }
  .stats-card .val { font-size: 1.3rem; font-weight: 700; color: var(--accent); }
  .stats-card .lbl { font-size: 0.72rem; color: var(--text-muted); margin-top: 2px; }
  #street-stats {
    background: var(--panel);
    border-radius: var(--radius);
    padding: 10px 16px;
    margin-bottom: 16px;
    border: 1px solid rgba(255,255,255,0.06);
    font-size: 0.82rem;
  }
  .street-stat-row {
    display: flex;
    justify-content: space-between;
    padding: 3px 0;
    color: var(--text-muted);
  }
  .street-stat-row span:first-child { color: var(--text); width: 70px; }

  #scenario-panel {
    background: linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
    border-radius: 16px;
    padding: 22px;
    border: 1px solid rgba(255,255,255,0.07);
    transition: opacity 0.15s ease;
  }
  .badge-row {
    display: flex;
    gap: 8px;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }
  .badge {
    background: var(--panel-2);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 0.78rem;
    color: var(--text-muted);
  }
  .badge b { color: var(--accent); font-size: 0.85rem; }

  .section-label {
    font-size: 0.72rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }
  #hero-cards, #board-cards {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }
  .card {
    width: 52px;
    height: 74px;
    background: #fdfdfb;
    border-radius: 7px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    box-shadow: 0 3px 8px rgba(0,0,0,0.35);
    font-weight: 700;
  }
  .card.red { color: var(--card-red); }
  .card.black { color: var(--card-black); }
  .card .rank { font-size: 1.05rem; line-height: 1; }
  .card .suit { font-size: 1.15rem; line-height: 1; }
  .card.empty {
    background: rgba(255,255,255,0.05);
    box-shadow: none;
    border: 1.5px dashed rgba(255,255,255,0.15);
  }
  #hero-cards .card { width: 60px; height: 84px; }

  #facing-box {
    background: rgba(0,0,0,0.2);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 20px;
    font-size: 0.92rem;
    line-height: 1.5;
    border-left: 3px solid var(--accent-2);
  }

  #action-buttons {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 6px;
  }
  .action-btn {
    flex: 1;
    min-width: 100px;
    padding: 13px 10px;
    border-radius: 10px;
    border: none;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    color: white;
    transition: transform 0.06s ease, opacity 0.15s ease;
  }
  .action-btn:active { transform: scale(0.97); }
  .action-fold { background: #55606b; }
  .action-check { background: #3d6f8f; }
  .action-call { background: #2f8f6f; }
  .action-bet, .action-raise { background: #c0442f; }
  .action-allin { background: #9b2fd6; }
  .action-btn.disabled { pointer-events: none; opacity: 0.55; }
  .action-btn.correct-choice { outline: 3px solid var(--good); opacity: 1; }
  .action-btn.wrong-choice { outline: 3px solid var(--bad); opacity: 1; }

  .feedback-panel {
    margin-top: 18px;
    padding: 16px 18px;
    border-radius: 12px;
    font-size: 0.9rem;
    line-height: 1.6;
  }
  .feedback-correct { background: rgba(63,191,111,0.12); border: 1px solid rgba(63,191,111,0.4); }
  .feedback-wrong { background: rgba(224,85,90,0.12); border: 1px solid rgba(224,85,90,0.4); }
  .feedback-headline { font-size: 1.02rem; font-weight: 700; margin-bottom: 8px; }
  .feedback-recommend { margin-bottom: 10px; color: var(--text-muted); }
  .feedback-recommend strong { color: var(--accent); }
  .eq-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 6px;
    font-size: 0.82rem;
  }
  .eq-row span:first-child { width: 130px; color: var(--text-muted); flex-shrink: 0; }
  .eq-row span:last-child { width: 50px; text-align: right; flex-shrink: 0; }
  .eq-bar { flex: 1; height: 8px; background: rgba(255,255,255,0.08); border-radius: 4px; overflow: hidden; }
  .eq-fill { height: 100%; background: var(--accent-2); }
  .muted-row { color: var(--text-muted); font-size: 0.8rem; margin-bottom: 6px; }
  .reasons { margin: 10px 0 6px 0; padding-left: 20px; }
  .reasons li { margin-bottom: 4px; }
  .disclaimer-mini { font-size: 0.72rem; color: var(--text-muted); margin: 8px 0 0 0; }
  .icm-box {
    margin-top: 14px;
    padding: 12px 14px;
    border-radius: 10px;
    background: rgba(212,164,55,0.08);
    border: 1px solid rgba(212,164,55,0.35);
  }
  .icm-title { font-weight: 700; margin-bottom: 8px; color: var(--accent); font-size: 0.9rem; }
  .icm-reco { margin-top: 6px; font-size: 0.88rem; }
  .icm-reco strong { color: var(--accent); }

  #next-hand-btn {
    display: block;
    width: 100%;
    margin-top: 18px;
    padding: 14px;
    border-radius: 10px;
    border: none;
    background: var(--accent);
    color: #2a1e00;
    font-weight: 700;
    font-size: 1rem;
    cursor: pointer;
  }
  #next-hand-btn:disabled { opacity: 0.6; cursor: default; }
  #next-hand-btn:hover:not(:disabled) { filter: brightness(1.08); }

  #loading-indicator {
    display: none;
    align-items: center;
    justify-content: center;
    gap: 8px;
    color: var(--text-muted);
    font-size: 0.85rem;
    padding: 40px 0;
  }
  .muted { color: var(--text-muted); }

  footer {
    text-align: center;
    color: var(--text-muted);
    font-size: 0.72rem;
    margin-top: 22px;
    line-height: 1.6;
  }

  @media (max-width: 480px) {
    .card { width: 44px; height: 62px; }
    #hero-cards .card { width: 52px; height: 74px; }
    .action-btn { min-width: 80px; font-size: 0.85rem; padding: 12px 8px; }
  }

  .mode-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
  }
  .mode-tab {
    flex: 1;
    background: var(--panel);
    border: 1px solid rgba(255,255,255,0.08);
    color: var(--text-muted);
    border-radius: 10px;
    padding: 11px 10px;
    font-size: 0.88rem;
    font-weight: 600;
    cursor: pointer;
  }
  .mode-tab.active {
    background: var(--panel-2);
    color: var(--accent);
    border-color: var(--accent);
  }

  #custom-panel {
    background: linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
    border-radius: 16px;
    padding: 22px;
    border: 1px solid rgba(255,255,255,0.07);
  }
  #custom-panel h3 { margin-top: 0; font-size: 1rem; }
  #custom-panel .hint { color: var(--text-muted); font-size: 0.8rem; margin-top: -6px; margin-bottom: 16px; line-height: 1.5; }
  .form-section-label {
    font-size: 0.72rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin: 18px 0 8px 0;
  }
  .form-section-label:first-of-type { margin-top: 0; }
  .form-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 10px;
    font-size: 0.88rem;
  }
  .form-row > label { flex-shrink: 0; color: var(--text-muted); }
  .form-row select, .form-row input[type="number"] {
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 6px;
    padding: 7px 8px;
    font-size: 0.86rem;
    min-width: 130px;
  }
  .card-picker { display: inline-flex; gap: 4px; }
  .card-picker select { min-width: 58px; padding: 6px 4px; }
  .card-picker-pair, .card-picker-row { display: flex; gap: 10px; flex-wrap: wrap; }
  #c-error {
    background: rgba(224,85,90,0.15);
    border: 1px solid rgba(224,85,90,0.4);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 0.82rem;
    margin: 12px 0;
  }
  .primary-btn {
    display: block;
    width: 100%;
    margin-top: 16px;
    padding: 14px;
    border-radius: 10px;
    border: none;
    background: var(--accent);
    color: #2a1e00;
    font-weight: 700;
    font-size: 1rem;
    cursor: pointer;
  }
  .primary-btn:hover { filter: brightness(1.08); }
  .custom-tag {
    display: inline-block;
    background: rgba(212,164,55,0.15);
    color: var(--accent);
    border: 1px solid rgba(212,164,55,0.4);
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 0.72rem;
    margin-bottom: 10px;
  }

  #chart-panel {
    background: linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
    border-radius: 16px;
    padding: 22px;
    border: 1px solid rgba(255,255,255,0.07);
    display: flex;
    flex-direction: column;
  }
  #chart-panel > h3 { margin: 0 0 6px 0; font-size: 1rem; flex: 0 0 auto; }
  .chart-controls {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    margin-bottom: 14px;
  }
  .chart-controls .form-row { margin-bottom: 0; flex: 1; min-width: 140px; }
  .chart-controls select { width: 100%; min-width: 0; }
  .chart-legend {
    display: flex;
    gap: 16px;
    align-items: center;
    margin-bottom: 8px;
    font-size: 0.78rem;
    color: var(--text-muted);
    flex-wrap: wrap;
    flex: 0 0 auto;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-swatch { width: 12px; height: 12px; border-radius: 3px; display: inline-block; }
  #chart-info {
    font-size: 0.78rem;
    color: var(--text-muted);
    margin-bottom: 8px;
    flex: 0 0 auto;
    min-height: 1.1em;
  }
  .chart-grid-wrap {
    position: relative;
    flex: 1 1 auto;
    min-height: 0;
    min-width: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  /* width/height are set inline in px by fitRangeGrid() (app.js) so the grid always fits the
     remaining flex space exactly - CSS aspect-ratio + max-width/max-height alone can't guarantee
     "shrink to whichever dimension is tighter" without occasionally overflowing and forcing a
     scrollbar, which is exactly what the no-scroll layout must avoid. */
  .range-grid {
    display: grid;
    grid-template-columns: repeat(13, 1fr);
    grid-template-rows: repeat(13, 1fr);
    gap: 1px;
    flex: 0 0 auto;
    /* the equity computation behind a fresh grid takes ~1-1.5s; instead of the page just
       freezing and then jump-cutting to the new chart, app.js dims the grid + shows a spinner
       while it computes, then removes the dim class - this transition is what turns that removal
       into a smooth fade-in instead of an instant swap. */
    transition: opacity 0.18s ease;
  }
  .range-grid.grid-loading { opacity: 0.25; }
  #grid-spinner {
    display: none;
    position: absolute;
    inset: 0;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }
  .grid-spinner-circle {
    width: 32px;
    height: 32px;
    border: 3px solid rgba(212,164,55,0.22);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: grid-spinner-rotate 0.7s linear infinite;
  }
  @keyframes grid-spinner-rotate { to { transform: rotate(360deg); } }
  }
  .range-cell {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(0.45rem, 1vw, 0.72rem);
    font-weight: 700;
    border-radius: 2px;
    letter-spacing: -0.3px;
  }
  .action-raise { background: #c0442f; color: #fff; }
  /* solid, distinctly different hue (violet/magenta) from raise's red-orange - the old gradient
     (135deg, #ff512f -> #b3006b) started at nearly the same orange-red as raise, so on the small
     169-cell grid and the tiny legend swatch the two looked almost identical at a glance. */
  .action-allin { background: #9b2fd6; color: #fff; }
  .action-call { background: #2f6f8f; color: #fff; }
  .action-fold { background: rgba(255,255,255,0.05); color: var(--text-muted); }

  .postflop-nav-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 6px 0 8px 0;
    flex-wrap: wrap;
  }
  .postflop-nav-row .primary-btn { margin-top: 0; }
  #chart-context-summary { font-size: 0.8rem; }

  /* ---- GTOWizard-style position strip + situation tabs (click-first chart UI) ---- */
  .chart-toprow {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 8px;
    font-size: 0.82rem;
  }
  .chart-tablesize-inline { display: flex; align-items: center; gap: 6px; color: var(--text-muted); flex-shrink: 0; }
  .chart-tablesize-inline b { color: var(--accent); }
  .chart-tablesize-inline select {
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 6px;
    padding: 5px 6px;
    font-size: 0.78rem;
  }
  .icon-btn.tiny { padding: 4px 9px; font-size: 0.7rem; }
  .to-flop-inline {
    background: var(--accent);
    color: #2a1e00;
    border: none;
    border-radius: 7px;
    padding: 5px 11px;
    font-size: 0.76rem;
    font-weight: 700;
    cursor: pointer;
  }
  .to-flop-inline:hover { filter: brightness(1.08); }
  /* Position strip is a vertical sidebar (one compact row per seat) rather than a horizontal
     strip of tall cards - the horizontal layout ate up vertical space that the square range
     grid needed far more (the grid is height-bound, so every pixel reclaimed from the strip's
     height turns directly into a bigger grid). A fixed-width sidebar also puts the app's leftover
     horizontal space (previously empty on wide screens, since the square grid stopped growing
     once it hit the shorter viewport dimension) to actual use instead of wasting it. */
  .pos-strip {
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex: 0 0 232px;
    overflow-y: auto;
    min-height: 0;
  }
  .pos-card {
    flex: 0 0 auto;
    min-width: 0;
    background: var(--panel-2);
    border: 1.5px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    padding: 5px 8px;
    color: var(--text);
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 7px;
  }
  .pos-card:hover { border-color: rgba(212,164,55,0.5); }
  .pos-card.selected,
  .pos-card.focused {
    border-color: var(--accent);
    background: rgba(212,164,55,0.14);
  }
  .pos-card.active { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent) inset; }
  .pos-card.upcoming { opacity: 0.58; }
  .pos-card.decided { border-style: solid; opacity: 0.9; }
  .pos-card.folded { opacity: 0.5; }
  .pos-card.decided:hover, .pos-card.upcoming:hover, .pos-card.folded:hover { opacity: 1; }
  .pos-card-label {
    flex: 0 0 34px;
    font-size: 0.8rem;
    font-weight: 700;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .pos-card-hint {
    flex: 0 0 64px;
    font-size: 0.62rem;
    color: var(--text-muted);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    padding-right: 6px;
    border-right: 1px solid rgba(255,255,255,0.08);
  }
  .pos-card-actions {
    display: flex;
    flex-direction: row;
    flex-wrap: wrap;
    flex: 1 1 auto;
    gap: 2px;
  }
  .pos-action-btn {
    flex: 1 1 auto;
    min-width: 34px;
    text-align: center;
    font-size: 0.66rem;
    font-weight: 700;
    border: 1px solid transparent;
    border-radius: 4px;
    padding: 3px 2px;
    cursor: pointer;
    background: rgba(255,255,255,0.04);
    font-family: inherit;
  }
  .pos-action-btn.action-fold { color: var(--text-muted); }
  .pos-action-btn.action-raise { color: #ff8a75; }
  .pos-action-btn.action-call { color: #7ec3f2; }
  /* light lavender, not another warm pink/coral tone - keeps allin clearly a different color
     family from raise's coral rather than just a lighter/darker shade of the same hue. */
  .pos-action-btn.action-allin { color: #cf8bff; }
  .pos-action-btn:hover:not(:disabled) { background: rgba(255,255,255,0.1); }
  /* chosen state: fill with the action's own bright color, dark text on top. Deliberately spelled
     out per-action instead of `background: currentColor` - currentColor resolves against this
     SAME rule's own color declaration (not the .action-* rule's), which would collapse background
     and text to the same near-black value and make the chosen button unreadable. */
  .pos-action-btn.chosen.action-fold { background: var(--text-muted); color: #0d1a14; border-color: rgba(255,255,255,0.3); }
  .pos-action-btn.chosen.action-raise { background: #ff8a75; color: #0d1a14; border-color: rgba(255,255,255,0.3); }
  .pos-action-btn.chosen.action-call { background: #7ec3f2; color: #0d1a14; border-color: rgba(255,255,255,0.3); }
  .pos-action-btn.chosen.action-allin { background: #cf8bff; color: #0d1a14; border-color: rgba(255,255,255,0.3); }
  .pos-action-btn:disabled {
    opacity: 0.28;
    cursor: not-allowed;
  }
  .pos-card.skeleton .pos-card-actions { color: var(--text-muted); animation: pos-skeleton-pulse 1s ease-in-out infinite; }
  @keyframes pos-skeleton-pulse { 0%, 100% { opacity: 0.35; } 50% { opacity: 0.75; } }

  .chart-postflop-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px 16px;
  }
  .chart-postflop-grid .form-row { margin-bottom: 0; }
  .chart-postflop-grid .form-row.span2 { grid-column: 1 / -1; }

  /* ---- single-view app shell: fixed-viewport, no vertical scroll, ever ---- */
  /* body's own top-level padding (set near the top of this stylesheet) would otherwise add on
     top of .app's height:100vh and push total content past the viewport - overflow:hidden would
     then silently CLIP the bottom of the page instead of showing a scrollbar, which is worse
     (invisible cut-off content). Zero it out here since .app now owns all of its own padding. */
  html, body { height: 100%; overflow: hidden; padding: 0; margin: 0; }
  .app {
    max-width: 1720px;
    width: 100%;
    height: 100vh;
    padding: 10px 22px 8px 22px;
    box-sizing: border-box;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 5px;
    overflow: hidden;
  }
  header { flex: 0 0 auto; margin-bottom: 0; flex-wrap: wrap; gap: 8px; }
  header h1 { font-size: 1.05rem; }

  .hand-toprow {

<script>
// ===== ClaudePoker Core Engine =====
// Card/deck utilities, 7-card hand evaluator, Chen scoring, Monte Carlo equity.
// Designed to run identically in Node (for testing) and in-browser (inlined into the app).

(function (root, factory) {
  if (typeof module === 'object' && module.exports) {
    module.exports = factory();
  } else {
    root.PokerCore = factory();
  }
})(typeof self !== 'undefined' ? self : this, function () {
  'use strict';

  const RANKS = '23456789TJQKA';
  const SUITS = 'shdc'; // spades, hearts, diamonds, clubs
  const RANK_VAL = {}; // '2'->2 ... 'A'->14
  RANKS.split('').forEach((r, i) => (RANK_VAL[r] = i + 2));

  function makeDeck() {
    const deck = [];
    for (const r of RANKS) for (const s of SUITS) deck.push(r + s);
    return deck;
  }

  function shuffle(arr, rng) {
    rng = rng || Math.random;
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(rng() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function rankOf(card) {
    return RANK_VAL[card[0]];
  }
  function suitOf(card) {
    return card[1];
  }

  // ---- 5-card hand evaluator ----
  // Returns a comparable score array: [category, tiebreak1, tiebreak2, ...]
  // category: 8=straight flush,7=quads,6=full house,5=flush,4=straight,
  //           3=trips,2=two pair,1=pair,0=high card
  const CATEGORY_NAMES = [
    'High Card', 'Pair', 'Two Pair', 'Trips', 'Straight',
    'Flush', 'Full House', 'Quads', 'Straight Flush'
  ];

  function evaluate5(cards) {
    const ranks = cards.map(rankOf).sort((a, b) => b - a);
    const suits = cards.map(suitOf);
    const isFlush = suits.every((s) => s === suits[0]);

    // count ranks
    const counts = {};
    for (const r of ranks) counts[r] = (counts[r] || 0) + 1;
    const groups = Object.entries(counts)
      .map(([r, c]) => [Number(r), c])
      .sort((a, b) => (b[1] - a[1]) || (b[0] - a[0]));

    // straight detection (handle wheel A-2-3-4-5)
    const uniqRanks = [...new Set(ranks)];
    let straightHigh = 0;
    if (uniqRanks.length === 5) {
      if (uniqRanks[0] - uniqRanks[4] === 4) straightHigh = uniqRanks[0];
      else if (uniqRanks.join(',') === '14,5,4,3,2') straightHigh = 5; // wheel
    }

    if (straightHigh && isFlush) return [8, straightHigh];
    if (groups[0][1] === 4) {
      const kicker = groups[1][0];
      return [7, groups[0][0], kicker];
    }
    if (groups[0][1] === 3 && groups[1][1] === 2) {
      return [6, groups[0][0], groups[1][0]];
    }
    if (isFlush) return [5, ...ranks];
    if (straightHigh) return [4, straightHigh];
    if (groups[0][1] === 3) {
      const kickers = groups.slice(1).map((g) => g[0]).sort((a, b) => b - a);
      return [3, groups[0][0], ...kickers];
    }
    if (groups[0][1] === 2 && groups[1][1] === 2) {
      const pairs = [groups[0][0], groups[1][0]].sort((a, b) => b - a);
      const kicker = groups[2][0];
      return [2, ...pairs, kicker];
    }
    if (groups[0][1] === 2) {
      const kickers = groups.slice(1).map((g) => g[0]).sort((a, b) => b - a);
      return [1, groups[0][0], ...kickers];
    }
    return [0, ...ranks];
  }

  function cmpScore(a, b) {
    const len = Math.max(a.length, b.length);
    for (let i = 0; i < len; i++) {
      const av = a[i] || 0, bv = b[i] || 0;
      if (av !== bv) return av - bv;
    }
    return 0;
  }

  function combinations(arr, k) {
    const results = [];
    const combo = [];
    function rec(start) {
      if (combo.length === k) {
        results.push(combo.slice());
        return;
      }
      for (let i = start; i < arr.length; i++) {
        combo.push(arr[i]);
        rec(i + 1);
        combo.pop();
      }
    }
    rec(0);
    return results;
  }

  // best 5-card score out of 6 or 7 cards
  function evaluateBest(cards) {
    if (cards.length === 5) return { score: evaluate5(cards), cards };
    const combos = combinations(cards, 5);
    let best = null;
    for (const c of combos) {
      const score = evaluate5(c);
      if (!best || cmpScore(score, best.score) > 0) best = { score, cards: c };
    }
    return best;
  }

  function handCategoryName(score) {
    return CATEGORY_NAMES[score[0]];
  }

  // ---- Chen formula (starting hand strength heuristic) ----
  // Standard published formula, used here to rank the 169 starting hands
  // so we can derive believable position-based opening ranges without
  // hand-typing solver output.
  function chenScore(hand) {
    // hand: ['Ah','Kd'] etc.
    const r1 = rankOf(hand[0]);
    const r2 = rankOf(hand[1]);
    const suited = suitOf(hand[0]) === suitOf(hand[1]);
    const hi = Math.max(r1, r2);
    const lo = Math.min(r1, r2);

    const cardPoints = { 14: 10, 13: 8, 12: 7, 11: 6 };
    let score = cardPoints[hi] || hi / 2;

    if (r1 === r2) {
      score = Math.max(score * 2, 5);
    }
    if (suited) score += 2;

    const gap = hi - lo - 1; // cards between them
    if (r1 !== r2) {
      if (gap === 1) score -= 1;
      else if (gap === 2) score -= 2;
      else if (gap === 3) score -= 4;
      else if (gap >= 4) score -= 5;
      // straight bonus for connected/close cards below Q
      if (gap <= 1 && hi < 12) score += 1;
    }
    return Math.round(score * 2) / 2; // round to nearest 0.5
  }

  // Generate the 169 canonical starting hands, e.g. 'AKs', 'AKo', 'TT'
  function all169Hands() {
    const list = [];
    const order = RANKS.split('').reverse(); // A,K,Q,...,2
    for (let i = 0; i < order.length; i++) {
      for (let j = i; j < order.length; j++) {
        if (i === j) {
          list.push(order[i] + order[j]); // pair, e.g. 'AA'
        } else {
          list.push(order[i] + order[j] + 's');
          list.push(order[i] + order[j] + 'o');
        }
      }
    }
    return list;
  }

  function scoreOfCanonical(hand) {
    // hand like 'AKs','TT','72o' -> build representative 2 cards and score
    const r1 = hand[0], r2 = hand[1];
    const suited = hand.length === 3 ? hand[2] === 's' : true; // pairs: suited flag unused
    const c1 = r1 + 's';
    const c2 = suited ? r2 + 's' : r2 + 'h';
    return chenScore([c1, c2]);
  }

  // Rank all 169 hands descending by Chen score (ties broken by raw card rank sum)
  const RANKED_169 = all169Hands()
    .map((h) => ({ hand: h, score: scoreOfCanonical(h) }))
    .sort((a, b) => {
      if (b.score !== a.score) return b.score - a.score;
      // tie-break: pairs > suited > offsuit, then high card
      const rv = (h) => RANK_VAL[h[0]] + RANK_VAL[h[1]];
      return rv(b.hand) - rv(a.hand);
    })
    .map((x) => x.hand);

  const RANK_INDEX = {}; // hand -> percentile rank (0 = best)
  RANKED_169.forEach((h, i) => (RANK_INDEX[h] = i));

  function canonicalOf(cards) {
    // cards: ['Ah','Kd'] -> 'AKo' / ['Ah','Kh'] -> 'AKs' / ['Ah','Ad'] -> 'AA'
    const r1 = cards[0][0], r2 = cards[1][0];
    const v1 = RANK_VAL[r1], v2 = RANK_VAL[r2];
    const suited = suitOf(cards[0]) === suitOf(cards[1]);
    if (v1 === v2) return r1 + r2;
    const hi = v1 > v2 ? r1 : r2;
    const lo = v1 > v2 ? r2 : r1;
    return hi + lo + (suited ? 's' : 'o');
  }

  // percentile: 0 = best possible hand (AA), 1 = worst (72o)
  function percentileOf(cards) {
    const canon = canonicalOf(cards);
    return RANK_INDEX[canon] / (RANKED_169.length - 1);
  }

  // top X% of hands as a Set of canonical hand strings
  function topPercent(pct) {
    const n = Math.max(1, Math.round((pct / 100) * RANKED_169.length));
    return new Set(RANKED_169.slice(0, n));
  }

  // expand a set of canonical hands into concrete 2-card combos (for range-vs-range equity)
  function expandRangeToCombos(canonSet, deadCards) {
    const dead = new Set(deadCards || []);
    const combos = [];
    for (const canon of canonSet) {
      const r1 = canon[0], r2 = canon[1];
      const isPair = r1 === r2;
      const suitedOnly = canon[2] === 's';
      for (const s1 of SUITS) {
        for (const s2 of SUITS) {
          if (isPair && s1 >= s2) continue; // avoid dup pairs, unordered
          if (!isPair && canon.length === 3) {
            if (suitedOnly && s1 !== s2) continue;
            if (!suitedOnly && s1 === s2) continue;
          }
          const c1 = r1 + s1, c2 = r2 + s2;
          if (c1 === c2) continue;
          if (dead.has(c1) || dead.has(c2)) continue;
          combos.push([c1, c2]);
        }
      }
    }
    // dedupe (pairs might double up depending on suit loop bounds)
    const seen = new Set();
    const out = [];
    for (const [a, b] of combos) {
      const key = [a, b].sort().join('-');
      if (seen.has(key)) continue;
      seen.add(key);
      out.push([a, b]);
    }
    return out;
  }

  // ---- Monte Carlo equity: hero hand vs a weighted villain range, given known board ----
  function simulateEquity(heroCards, villainCombos, board, opts) {
    opts = opts || {};
    const iterations = opts.iterations || 300;
    const rng = opts.rng || Math.random;

    const usedByBoard = new Set([...heroCards, ...board]);
    // filter villain combos that conflict with hero/board
    const validCombos = villainCombos.filter(
      ([a, b]) => !usedByBoard.has(a) && !usedByBoard.has(b)
    );
    if (validCombos.length === 0) return { equity: 0.5, win: 0, tie: 0, lose: 0, n: 0 };

    let win = 0, tie = 0, lose = 0, n = 0;
    const fullDeck = makeDeck();

    for (let iter = 0; iter < iterations; iter++) {
      // pick a random villain combo each iteration (uniform over range)
      const combo = validCombos[Math.floor(rng() * validCombos.length)];
      const dead = new Set([...heroCards, ...board, ...combo]);
      const remaining = fullDeck.filter((c) => !dead.has(c));
      const needed = 5 - board.length;
      let runoutBoard = board.slice();
      if (needed > 0) {
        const shuffled = shuffle(remaining, rng);
        runoutBoard = board.concat(shuffled.slice(0, needed));
      }
      const heroBest = evaluateBest(heroCards.concat(runoutBoard));
      const villBest = evaluateBest(combo.concat(runoutBoard));
      const cmp = cmpScore(heroBest.score, villBest.score);
      if (cmp > 0) win++;
      else if (cmp === 0) tie++;
      else lose++;
      n++;
    }
    const equity = (win + tie / 2) / n;
    return { equity, win, tie, lose, n };
  }

  // Representative concrete cards for a canonical hand string, e.g. 'AKs' -> ['As','Ks'].
  function representativeCards(canon) {
    const r1 = canon[0], r2 = canon[1];
    if (r1 === r2) return [r1 + 's', r2 + 'h'];
    const suited = canon.length === 3 && canon[2] === 's';
    return suited ? [r1 + 's', r2 + 's'] : [r1 + 's', r2 + 'h'];
  }

  // Like representativeCards, but picks a concrete suit assignment that avoids a set of
  // dead cards (e.g. board cards on a specific flop/turn/river). Needed for postflop range
  // charts: representativeCards() always returns the same fixed suits ('s'/'h'), which will
  // collide with the board as soon as a specific board is pinned (e.g. canonical 'AKo' on a
  // board containing As would try to reuse As). Returns null only in the pathological case
  // where every suit combination for this rank pair is already dead (can't happen with a
  // legal <=5-card board, but guarded anyway).
  function representativeCardsAvoiding(canon, deadCards) {
    const dead = new Set(deadCards || []);
    const r1 = canon[0], r2 = canon[1];
    const isPair = r1 === r2;
    const suited = canon.length === 3 && canon[2] === 's';
    if (isPair) {
      for (const s1 of SUITS) {
        for (const s2 of SUITS) {
          if (s1 === s2) continue;
          const c1 = r1 + s1, c2 = r2 + s2;
          if (!dead.has(c1) && !dead.has(c2)) return [c1, c2];
        }
      }
      return null;
    }
    if (suited) {
      for (const s of SUITS) {
        const c1 = r1 + s, c2 = r2 + s;
        if (!dead.has(c1) && !dead.has(c2)) return [c1, c2];
      }
      return null;
    }
    for (const s1 of SUITS) {
      for (const s2 of SUITS) {
        if (s1 === s2) continue;
        const c1 = r1 + s1, c2 = r2 + s2;
        if (!dead.has(c1) && !dead.has(c2)) return [c1, c2];
      }
    }
    return null;
  }

  // ---- Memoized preflop equity: canonical hero hand vs a canonical villain range ----
  // Preflop (no board) equity for a given (heroCanon, villainRange) pair is deterministic
  // enough to cache - the same handful of position-based ranges recur across many generated
  // hands, so after a short warmup almost every lookup is a cache hit. This is the single
  // biggest lever for keeping "deal a new hand" snappy in the browser.
  const EQUITY_CACHE = new Map();
  function equityOfCanonicalVsRange(heroCanon, villainRangeSet, opts) {
    opts = opts || {};
    const iterations = opts.iterations || 300;
    const sig = heroCanon + '::' + [...villainRangeSet].sort().join(',') + '::' + iterations;
    if (EQUITY_CACHE.has(sig)) return EQUITY_CACHE.get(sig);
    const heroCards = representativeCards(heroCanon);
    const combos = expandRangeToCombos(villainRangeSet, heroCards);
    const result = simulateEquity(heroCards, combos, [], { iterations, rng: opts.rng || Math.random });
    EQUITY_CACHE.set(sig, result);
    return result;
  }

  return {
    RANKS, SUITS, RANK_VAL,
    makeDeck, shuffle, rankOf, suitOf,
    evaluate5, evaluateBest, cmpScore, handCategoryName, CATEGORY_NAMES,
    combinations,
    chenScore, all169Hands, RANKED_169, RANK_INDEX,
    canonicalOf, percentileOf, topPercent, expandRangeToCombos,
    simulateEquity, representativeCards, representativeCardsAvoiding, equityOfCanonicalVsRange,
  };
});
</script>
<script>
// ===== ClaudePoker ICM Module =====
// Real ICM (Independent Chip Model) equity via the standard Malmuth-Harville recursive model,
// implemented as an efficient bitmask DP: O(2^n * n) instead of the naive O(n!/(n-k)!)
// enumeration. Supports up to ~12 remaining players before the 2^n state space gets large
// (9 players -> 512 states, trivial).
//
// This computes each player's expected share of the prize pool ($EV) given everyone's chip
// stack and the payout structure - the actual tool used to reason about bubble/pay-jump
// situations, rather than a vague "risk premium" slider.

(function (root, factory) {
  if (typeof module === 'object' && module.exports) {
    module.exports = factory();
  } else {
    root.PokerICM = factory();
  }
})(typeof self !== 'undefined' ? self : this, function () {
  'use strict';

  function popcount(x) {
    let c = 0;
    while (x) {
      c += x & 1;
      x >>= 1;
    }
    return c;
  }

  function activeSum(stacks, mask) {
    let s = 0;
    for (let i = 0; i < stacks.length; i++) if (mask & (1 << i)) s += stacks[i];
    return s;
  }

  /**
   * Compute each player's ICM $EV given chip stacks and a payout structure.
   * @param {number[]} stacks - chip counts, one per remaining player (must be > 0)
   * @param {number[]} payouts - $ (or any consistent unit) paid to place 1, 2, 3... Places
   *                             beyond payouts.length receive 0.
   * @returns {number[]} expected $ value per player, same order/index as stacks
   */
  function icmEquity(stacks, payouts) {
    const n = stacks.length;
    if (n === 0) return [];
    if (n > 20) throw new Error('icmEquity: too many players for bitmask DP (max 20)');
    const numPayouts = Math.min(payouts.length, n);
    const fullMask = (1 << n) - 1;
    const equity = new Array(n).fill(0);
    const reachProb = new Array(1 << n).fill(0);
    reachProb[fullMask] = 1;

    const masks = [];
    for (let m = 1; m <= fullMask; m++) masks.push(m);
    masks.sort((a, b) => popcount(b) - popcount(a));

    for (const mask of masks) {
      const rp = reachProb[mask];
      if (!rp) continue;
      const placedSoFar = n - popcount(mask);
      const placeNumber = placedSoFar + 1; // 1-indexed place being decided at this step
      if (placeNumber > numPayouts) continue; // nothing left to pay out from here
      const sum = activeSum(stacks, mask);
      if (sum <= 0) continue;
      for (let i = 0; i < n; i++) {
        if (!(mask & (1 << i))) continue;
        const p = stacks[i] / sum;
        const prob = rp * p;
        equity[i] += prob * (payouts[placeNumber - 1] || 0);
        const nextMask = mask & ~(1 << i);
        reachProb[nextMask] += prob;
      }
    }
    return equity;
  }

  /**
   * Generate a normalized payout distribution (fractions of the prize pool summing to 1)
   * for `paidPlaces` places, shaped by `topHeaviness` (higher = more winner-take-most).
   * weight[i] = (paidPlaces - i) ^ topHeaviness, normalized.
   */
  function generatePayoutWeights(paidPlaces, topHeaviness) {
    const exp = topHeaviness || 1.6;
    const raw = [];
    for (let i = 0; i < paidPlaces; i++) raw.push(Math.pow(paidPlaces - i, exp));
    const sum = raw.reduce((a, b) => a + b, 0);
    return raw.map((w) => w / sum);
  }

  /**
   * ICM-aware call/fold analysis for a single all-in-style decision.
   * heroIdx/villainIdx point into `stacks`/`payouts` context; other players' stacks are
   * assumed unchanged by this particular hand.
   *
   * @param {object} p
   *   stacks: number[] - all remaining players' stacks in bb, hero first (index 0)
   *   payouts: number[] - payout fractions or $ per place
   *   heroIdx, villainIdx: indices into stacks for the two players in the hand (default 0, 1)
   *   potBB: pot already in middle before hero's call (bb)
   *   toCallBB: amount hero must add to call (bb)
   *   equity: hero's chip equity (0-1) to win the hand if called
   */
  function analyzeICMDecision(p) {
    const stacks = p.stacks.slice();
    const heroIdx = p.heroIdx === undefined ? 0 : p.heroIdx;
    const villainIdx = p.villainIdx === undefined ? 1 : p.villainIdx;
    const potBB = p.potBB || 0;
    const toCallBB = p.toCallBB || 0;
    const equity = p.equity;
    const payouts = p.payouts;

    const heroStack = stacks[heroIdx];
    const villainStack = stacks[villainIdx];
    const callAmount = Math.min(toCallBB, heroStack);
    const potAfterCall = potBB + callAmount;

    // Convention: `stacks` holds each player's CURRENT remaining stack, i.e. any chips already
    // wagered into potBB (by either player, on this or earlier streets) are NOT included in
    // either player's stack figure here - they're already "in the middle."
    // If hero calls and wins: hero collects the whole pot (potBB + their own call).
    // If hero calls and loses: villain collects the whole pot.
    const stacksWin = stacks.slice();
    stacksWin[heroIdx] = heroStack - callAmount + potAfterCall;
    stacksWin[villainIdx] = villainStack; // villain's remaining stack is unaffected by losing the pot

    const stacksLose = stacks.slice();
    stacksLose[heroIdx] = Math.max(0, heroStack - callAmount);
    stacksLose[villainIdx] = villainStack + potAfterCall;

    const stacksFold = stacks.slice(); // hero and villain stacks unchanged by folding

    function removeBusted(st) {
      // ICM requires positive stacks; treat 0-stack players as already eliminated (excluded
      // from the remaining-player equity calc, their payout is implicitly locked in below).
      const idxMap = [];
      const filtered = [];
      st.forEach((s, i) => {
        if (s > 0) {
          idxMap.push(i);
          filtered.push(s);
        }
      });
      return { filtered, idxMap };
    }

    function heroEquityFor(st) {
      const { filtered, idxMap } = removeBusted(st);
      if (idxMap.indexOf(heroIdx) === -1) return 0; // hero busted, gets nothing further
      const eq = icmEquity(filtered, payouts);
      const pos = idxMap.indexOf(heroIdx);
      return eq[pos];
    }

    const evCallWin = heroEquityFor(stacksWin);
    const evCallLose = heroEquityFor(stacksLose);
    const evCall = equity * evCallWin + (1 - equity) * evCallLose;
    const evFold = heroEquityFor(stacksFold);

    // binary search for the equity at which evCall === evFold (the ICM-adjusted breakeven)
    let lo = 0, hi = 1;
    for (let iter = 0; iter < 40; iter++) {
      const mid = (lo + hi) / 2;
      const evMid = mid * evCallWin + (1 - mid) * evCallLose;
      if (evMid < evFold) lo = mid; else hi = mid;
    }
    const icmRequiredEquity = (lo + hi) / 2;

    const chipRequiredEquity = (potBB + callAmount) > 0 ? callAmount / (potBB + callAmount) : 0;

    return {
      evCall, evFold, evCallWin, evCallLose,
      chipRequiredEquity, icmRequiredEquity,
      icmPremium: icmRequiredEquity - chipRequiredEquity,
      recommendation: evCall >= evFold ? 'call' : 'fold',
    };
  }

  return { icmEquity, generatePayoutWeights, analyzeICMDecision, popcount };
});

<script>
// ===== ClaudePoker Preflop Module =====
// Position-based opening/3bet/4bet ranges (derived from Chen-score ranking, calibrated to
// widely-published modern 100bb range sizes) plus a preflop decision function that blends
// chart-based raise ranges with equity-vs-range calling decisions.
//
// IMPORTANT: these are heuristic approximations for study purposes, not solver output.

(function (root, factory) {

  'use strict';

  // Position lists by table size (5 to 9 handed). Preflop action order, first-to-act to last.
  const POSITIONS_BY_SIZE = {
    5: ['UTG', 'CO', 'BTN', 'SB', 'BB'],
    6: ['UTG', 'HJ', 'CO', 'BTN', 'SB', 'BB'],
    7: ['UTG', 'UTG1', 'HJ', 'CO', 'BTN', 'SB', 'BB'],
    8: ['UTG', 'UTG1', 'MP', 'HJ', 'CO', 'BTN', 'SB', 'BB'],

  // Wider with fewer players at the table, tighter from earlier seats - standard shorthanded
  // vs full-ring adjustment, calibrated by hand rather than solver output.
  const OPEN_PCT_BY_SIZE = {
    5: { UTG: 22, CO: 30, BTN: 50, SB: 42 },
    6: { UTG: 16, HJ: 20, CO: 27, BTN: 45, SB: 38 },
    7: { UTG: 14, UTG1: 16, HJ: 19, CO: 25, BTN: 43, SB: 37 },
    8: { UTG: 12, UTG1: 14, MP: 16, HJ: 19, CO: 24, BTN: 42, SB: 36 },
    9: { UTG: 11, UTG1: 12, UTG2: 14, MP: 16, HJ: 18, CO: 23, BTN: 40, SB: 35 },
  };

  // Light 3-bet bluff additions (suited wheel aces / suited connectors), applied when hero
  // is in the blinds or button and facing a late-position open - purely illustrative balance.
  const THREEBET_BLUFF_CANDIDATES = ['A5s', 'A4s', 'A3s', 'A2s', 'K9s', 'Q9s', 'J9s', '76s', '65s', '54s'];

  const FOURBET_PCT = 2.5; // roughly QQ+ / AK, treated as table-size independent
  const FOURBET_BLUFF_CANDIDATES = ['A5s', 'A4s'];

  function positionsFor(tableSize) {
    return POSITIONS_BY_SIZE[tableSize] || POSITIONS_BY_SIZE[6];
  }

  function openThreshold(pos, tableSize) {
    const table = OPEN_PCT_BY_SIZE[tableSize] || OPEN_PCT_BY_SIZE[6];

  }

  // 3-bet range size (% of hands), derived from how wide the opener's own range is - wider
  // opens invite wider 3-bets - PLUS hero's own positional advantage over the opener: a hero
  // sitting many seats behind the opener (or squeezing from the blinds) can profitably 3-bet
  // wider than a hero who's barely later than the opener. This formula is fit to match the
  // previously hand-calibrated 6-max numbers (UTG ~4%, HJ ~5%, CO ~6.5%, BTN ~8.5%, SB ~9.5%)
  // as its baseline before the positional nudge, and generalizes to any table size / position
  // without needing a name-keyed table for every size.
  function threeBetThreshold(heroPos, openerPos, tableSize) {
    const openPct = openThreshold(openerPos, tableSize);
    const base = 2.5 + openPct * 0.13;
    const order = positionsFor(tableSize);
    const heroIdx = order.indexOf(heroPos);
    const openerIdx = order.indexOf(openerPos);
    const seatGap = Math.max(0, heroIdx - openerIdx - 1); // players who folded between opener and hero
    const gapBonus = Math.min(seatGap * 0.5, 3); // further back -> wider (up to +3%)
    const blindBonus = heroPos === 'SB' || heroPos === 'BB' ? 1.3 : 0; // blind squeeze tendency
    const pct = base + gapBonus + blindBonus;

  // Real in/out-of-position check vs an opener, based on POSTFLOP acting order (blinds act
  // first postflop; everyone else keeps their original preflop relative order, BTN always
  // last) - NOT raw preflop order, where blinds look "later" despite acting first after the
  // flop. Using raw preflop order here previously made this always true for any valid
  // hero/opener pairing in the "facing an open" charts (since hero must be preflop-later than
  // the opener by construction), which made the resulting ranges look identical no matter what
  // hero position was selected.
  function postflopOrderFor(tableSize) {
    const order = positionsFor(tableSize);
    const blinds = order.filter((p) => p === 'SB' || p === 'BB');
    const rest = order.filter((p) => p !== 'SB' && p !== 'BB');

  function inPosition(heroPos, openerPos, tableSize) {
    const order = postflopOrderFor(tableSize);
    return order.indexOf(heroPos) > order.indexOf(openerPos);
  }

  function buildRangeSet(pct) {
    return Core.topPercent(pct);
  }

  function addBluffs(rangeSet, candidates) {
    const s = new Set(rangeSet);
    candidates.forEach((c) => s.add(c));
    return s;
  }

  // Opening range for a position (raise-first-in)
  function openingRange(pos, tableSize) {
    return buildRangeSet(openThreshold(pos, tableSize));
  }

  // 3-bet value+bluff range vs a given opener position, from hero's given position
  function threeBetRange(heroPos, openerPos, tableSize) {
    const pct = threeBetThreshold(heroPos, openerPos, tableSize);
    let range = buildRangeSet(pct);
    if (inPosition(heroPos, openerPos, tableSize) || heroPos === 'BB' || heroPos === 'SB') {
      range = addBluffs(range, THREEBET_BLUFF_CANDIDATES);
    }
    return range;
  }

  function fourBetRange(heroPos) {
    let range = buildRangeSet(FOURBET_PCT);
    range = addBluffs(range, FOURBET_BLUFF_CANDIDATES);
    return range;
  }

  // ---- Stack-depth (effective stack in bb) tiers ----
  // The ranges above are all calibrated to a ~100bb baseline. As effective stack gets shorter,
  // real preflop strategy shifts toward push/fold: raising ranges widen (fold equity from
  // shoving matters more than raw hand strength) and standard-sized raises stop existing at all
  // - opens, 3-bets, and 4-bets are ALL effectively shoves once stacks are short enough. This is
  // a calibrated heuristic approximation layered on the baseline ranges above, NOT a real
  // push/fold Nash-equilibrium solver (which would need its own ICM/fold-equity model per stack
  // depth and player count) - consistent with the rest of this engine's "approximation for study
  // purposes" framing.
  function stackTier(stackBB) {
    if (stackBB <= 12) return 'micro'; // essentially push/fold only
    if (stackBB <= 20) return 'short'; // shove-heavy, standard-sized raising mostly gone
    if (stackBB <= 40) return 'mid';   // some standard raising left, but 3bet+ is often a shove
    return 'deep'; // 40bb+ - baseline 100bb-calibrated numbers apply essentially as-is
  }
  const STACK_TIER_ADJUST = {
    deep:  { openMult: 1.00, allRaisesAreAllin: false },
    mid:   { openMult: 1.12, allRaisesAreAllin: false },
    short: { openMult: 1.28, allRaisesAreAllin: true },
    micro: { openMult: 1.45, allRaisesAreAllin: true },
  };
  function stackTierAdjust(stackBB) {
    return STACK_TIER_ADJUST[stackTier(stackBB)];
  }

  // ---- Push/fold shove-width curve for short/micro effective stacks ----
  // At a genuinely shallow effective stack (<=20bb, see stackTier), a standard-sized open isn't
  // real strategy - once money starts going in, both players are functionally committed to
  // playing for stacks, so the only two real options are shove or fold, and how wide that shove
  // range should be is a real push/fold-theory question, not a flat multiplier on the
  // 100bb-calibrated open range (which is what this used to do, via `openMult` alone - a
  // constant multiplier can't reproduce the actual SHAPE of a push/fold curve, which widens
  // increasingly steeply as the stack keeps shrinking, not linearly).
  //
  // This was originally built as a live mutual-best-response (Nash) solve between hero's shove
  // range and a big-blind-shaped calling range, iterated to convergence in-browser. In testing
  // that approach turned out to be a dead end for this tool: with few enough Monte Carlo samples
  // to run live it doesn't reliably converge (best-response iteration can oscillate rather than
  // settle), and with enough samples to converge reliably it takes several seconds per stack
  // change - a bad tradeoff for a chart meant to update instantly as you experiment with depths.
  // So instead this is a smooth, monotonically-widening curve fit to widely-cited push/fold
  // shove-range sizes at reference depths (the same "calibrate to published numbers" approach
  // this whole file already uses for the 100bb open-raise sizes above - see OPEN_PCT_BY_SIZE).
  // Anchors (position-agnostic average width; positional shape is layered on afterward): 20bb
  // ~20%, 15bb ~32%, 10bb ~46%, 8bb ~55%, 6bb ~66%, 4bb ~84%.
  const PUSH_FOLD_ANCHORS = [
    { bb: 20, pct: 20 }, { bb: 18, pct: 24 }, { bb: 16, pct: 28 }, { bb: 15, pct: 32 },
    { bb: 14, pct: 34 }, { bb: 12, pct: 39 }, { bb: 10, pct: 46 }, { bb: 8, pct: 55 },
    { bb: 6, pct: 66 }, { bb: 5, pct: 74 }, { bb: 4, pct: 84 }, { bb: 2, pct: 96 },
  ];
  function pushFoldShovePct(stackBB, opts) {
    opts = opts || {};
    const icmPremium = opts.icmPremium || 0;

    let pct;
    if (stackBB >= pts[0].bb) {

      pct = pts[pts.length - 1].pct;
    } else {
      let lo = pts[pts.length - 1], hi = pts[0];
      for (let i = 0; i < pts.length - 1; i++) {
        if (stackBB <= pts[i].bb && stackBB >= pts[i + 1].bb) { hi = pts[i]; lo = pts[i + 1]; break; }
      }
      const t = (stackBB - lo.bb) / (hi.bb - lo.bb);

    // pressure makes covering stacks call tighter, which means hero can profitably shove wider
    // for the same fold equity - approximated here as a direct widening of the shove curve.

  }

  // ---- ICM premium: how much extra equity a call/stack-off needs under tournament pressure ----
  // Chip-EV pot odds ("callCost / potAfterCall") are the right bar in a cash game, where a chip
  // is always worth the same. In a tournament, busting is disproportionately costly relative to
  // the $EV lost (you can't rebuy your finishing position), so real-money-adjusted equity
  // requirements are higher - the ICM premium. Computed here from the actual Malmuth-Harville

  // fixed reference tournament shape (mid-size field, ~15% paid, moderately top-heavy payouts -
  // a deliberately generic mid-stage MTT scenario, since the range chart doesn't collect exact
  // field size / payout structure from the user). The gap between the ICM-adjusted breakeven
  // equity and the chip-EV breakeven equity (50%) at that reference spot is the premium applied
  // everywhere a tournament calling/stacking-off decision is evaluated.

  const _icmPremiumCache = {};

    const key = Math.round(stackBB * 2) / 2;

    const cfg = ICM_REFERENCE;
    const stacks = [stackBB];
    for (let i = 1; i < cfg.remainingPlayers; i++) stacks.push(cfg.avgStackBB);
    const payouts = ICM.generatePayoutWeights(cfg.paidPlaces, cfg.topHeaviness);
    const result = ICM.analyzeICMDecision({
      stacks, payouts, heroIdx: 0, villainIdx: 1,
      potBB: 1.5, toCallBB: stackBB, equity: 0.5,
    });

    _icmPremiumCache[key] = premium;
    return premium;
  }

  function openingRangeAtStack(pos, tableSize, stackBB, opts) {
    opts = opts || {};
    const tier = stackTier(stackBB);
    if (tier === 'short' || tier === 'micro') {
      // Position still matters at push/fold depths (UTG has more players left to act behind -
      // more cumulative calling risk - than the button), but solving a full N-way equilibrium
      // per seat is out of scope here. Instead, solve the position-agnostic "vs one BB defender"
      // equilibrium width once per stack depth (the expensive part), then scale it by this
      // position's existing relative openness vs the table's average 100bb-calibrated open
      // (which already correctly encodes "earlier seats play tighter") - blends the rigorous
      // stack-depth math with the already-calibrated positional shape.
      const basePct = pushFoldShovePct(stackBB, opts);
      const table = OPEN_PCT_BY_SIZE[tableSize] || OPEN_PCT_BY_SIZE[6];
      const values = Object.keys(table).map((k) => table[k]);
      const avg = values.reduce((a, b) => a + b, 0) / values.length;

    let range = buildRangeSet(pct);

    }
    return range;
  }
  function fourBetRangeAtStack(heroPos, stackBB) {
    const adj = stackTierAdjust(stackBB);
    const pct = Math.min(100, FOURBET_PCT * adj.openMult);
    let range = buildRangeSet(pct);
    range = addBluffs(range, FOURBET_BLUFF_CANDIDATES);
    return range;

      open: 2.3,
      openMultiPerLimper: 1.0,
      threeBetIP: 3.0, // multiplier of open size
      threeBetOOP: 3.7,
      fourBetMultiplier: 2.3, // multiplier of the 3bet size

  // playability adjustment: how much cushion (in equity) a hand needs beyond raw pot odds
  // to be a profitable call, given postflop factors like domination risk and reverse implied odds.
  function playabilityAdjustment(canonHand) {

    const suited = canonHand.length === 3 && canonHand[2] === 's';
    const r1 = Core.RANK_VAL[canonHand[0]];
    const r2 = Core.RANK_VAL[canonHand[1]];

    if (suited && gap <= 2) return -0.015; // suited connectors/one-gappers: good implied odds

  /**
   * Decide hero's preflop action.
   * @param {string[]} heroCards - e.g. ['Ah','Kd']
   * @param {string} heroPos
   * @param {object} facing - { type: 'unopened' } | { type:'open', openerPos, sizeBB, potBB }

   * @param {object} opts - { tableSize, rng, iterations }
   */
  function decidePreflop(heroCards, heroPos, facing, opts) {
    opts = opts || {};
    const tableSize = opts.tableSize || 6;
    const canon = Core.canonicalOf(heroCards);
    const S = sizing();

    if (facing.type === 'unopened') {
      const range = openingRange(heroPos, tableSize);
      if (range.has(canon)) {
        return {
          action: 'raise',
          label: `오픈 레이즈 ${S.open}bb`,
          sizeBB: S.open,
          reasons: [
            `${heroPos} 포지션에서 상위 ${openThreshold(heroPos, tableSize)}% 안에 드는 핸드입니다.`,
            `${heroPos}에서는 이 핸드로 레이즈해서 팟을 선점하는 것이 기본 전략입니다.`,
          ],
        };
      }
      return {
        action: 'fold',
        label: '폴드',
        reasons: [
          `${heroPos} 포지션의 오픈 레인지(상위 ${openThreshold(heroPos, tableSize)}%) 밖의 핸드입니다.`,
          '얼리/미들 포지션일수록 좁은 레인지로 열어야 포지션 불리함을 상쇄할 수 있습니다.',
        ],
      };
    }

    if (facing.type === 'open') {
      const { openerPos, sizeBB, potBB } = facing;
      const threeBetSet = threeBetRange(heroPos, openerPos, tableSize);
      if (threeBetSet.has(canon)) {
        const mult = inPosition(heroPos, openerPos, tableSize) ? S.threeBetIP : S.threeBetOOP;
        const size = Math.round(sizeBB * mult * 10) / 10;
        return {
          action: 'raise',
          label: `3벳 ${size}bb`,
          sizeBB: size,
          reasons: [
            `${openerPos} 오픈에 대한 상위 ${threeBetThreshold(heroPos, openerPos, tableSize)}% 3벳 레인지에 포함됩니다.`,
            '밸류 또는 밸런스를 위한 블러프 콤보로 공격적으로 대응합니다.',
          ],

      const villainRange = openingRange(openerPos, tableSize);

      // order) makes a call profitable with less raw equity since hero realizes more of it; being
      // out of position (blinds calling an open) needs extra cushion. Also, the fewer players left
      // to act behind hero, the less squeeze/overcall risk, so a small additional discount applies
      // as hero gets closer to the button.
      const order = positionsFor(tableSize);
      const seatsBehind = order.length - 1 - order.indexOf(heroPos);
      requiredEquity += inPosition(heroPos, openerPos, tableSize) ? -0.012 : 0.018;
      requiredEquity -= Math.max(0, 4 - seatsBehind) * 0.003;
      requiredEquity += opts.icmPremium || 0; // real ICM pressure, not a flat stack fudge - see icmPremiumForTournament

      if (eq.equity >= requiredEquity) {
        return {
          action: 'call',
          label: `콜 ${callAmount}bb`,
          sizeBB: callAmount,
          reasons: [
            `${openerPos} 오픈 레인지 대비 추정 에퀴티 ${(eq.equity * 100).toFixed(1)}% (필요 에퀴티 ${(requiredEquity * 100).toFixed(1)}%).`,
            '3벳하기엔 약하지만 포지션/팟오즈를 고려하면 콜이 이득입니다.',
          ],
          equity: eq.equity,
          requiredEquity,
        };
      }
      return {
        action: 'fold',
        label: '폴드',
        reasons: [
          `${openerPos} 오픈 레인지 대비 추정 에퀴티 ${(eq.equity * 100).toFixed(1)}%로 필요 에퀴티 ${(requiredEquity * 100).toFixed(1)}%에 못 미칩니다.`,
          '3벳 레인지에도, 콜 기준에도 들지 않는 핸드입니다.',
        ],
        equity: eq.equity,
        requiredEquity,
      };
    }

    if (facing.type === 'threebet') {
      const { threebettorPos, openerPos, sizeBB, potBB } = facing;
      const fbSet = fourBetRange(heroPos);
      if (fbSet.has(canon)) {
        const size = Math.round(sizeBB * S.fourBetMultiplier * 10) / 10;
        return {
          action: 'raise',
          label: `4벳 ${size}bb`,
          sizeBB: size,
          reasons: [
            `${threebettorPos}의 3벳에 대해 상위 ${FOURBET_PCT}% 4벳 레인지에 포함됩니다.`,
